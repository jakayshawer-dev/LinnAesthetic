<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>final-v3集成测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-case {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .input-group {
            margin: 10px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>final-v3引擎集成测试</h1>
    
    <div class="test-case">
        <h2>测试1：生成测试数据</h2>
        
        <div class="input-group">
            <label for="truthTendency">真假倾向：</label>
            <select id="truthTendency">
                <option value="假性倾向">假性倾向</option>
                <option value="混合倾向" selected>混合倾向</option>
                <option value="真性倾向">真性倾向</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="mainProblemDirection">主问题方向：</label>
            <select id="mainProblemDirection">
                <option value="肌肉-软组织方向">肌肉-软组织方向</option>
                <option value="筋膜-位置牵拉方向">筋膜-位置牵拉方向</option>
                <option value="动态控制方向" selected>动态控制方向</option>
                <option value="体态代偿方向">体态代偿方向</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="sideHint">左右侧提示：</label>
            <select id="sideHint">
                <option value="左侧更明显">左侧更明显</option>
                <option value="右侧更明显" selected>右侧更明显</option>
                <option value="暂不明确">暂不明确</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="complexityHint">复杂度提示：</label>
            <select id="complexityHint">
                <option value="一般初筛" selected>一般初筛</option>
                <option value="建议进一步评估">建议进一步评估</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q1">Q1：</label>
            <select id="Q1">
                <option value="静态拍照时更明显">静态拍照时更明显</option>
                <option value="微笑或说话时更明显" selected>微笑或说话时更明显</option>
                <option value="咀嚼或用力时更明显">咀嚼或用力时更明显</option>
                <option value="每天看起来不太一样，不太稳定">每天看起来不太一样，不太稳定</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q2">Q2：</label>
            <select id="Q2">
                <option value="单侧咀嚼比较明显">单侧咀嚼比较明显</option>
                <option value="单侧托脸、侧睡或偏向一侧支撑比较明显">单侧托脸、侧睡或偏向一侧支撑比较明显</option>
                <option value="某一侧表情或发力更常用" selected>某一侧表情或发力更常用</option>
                <option value="没有明显感觉，或不确定">没有明显感觉，或不确定</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q3">Q3：</label>
            <select id="Q3">
                <option value="长期都比较稳定，位置和感觉差不多">长期都比较稳定，位置和感觉差不多</option>
                <option value="最近越来越明显">最近越来越明显</option>
                <option value="有时觉得左边明显，有时又觉得右边明显">有时觉得左边明显，有时又觉得右边明显</option>
                <option value="静态还好，但一动起来就更明显" selected>静态还好，但一动起来就更明显</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q4">Q4：</label>
            <select id="Q4">
                <option value="为什么一边脸看起来更大">为什么一边脸看起来更大</option>
                <option value="为什么两边位置/高低/线条方向不一样" selected>为什么两边位置/高低/线条方向不一样</option>
                <option value="为什么静态还好，一做动作差异就出来">为什么静态还好，一做动作差异就出来</option>
                <option value="为什么问题会和习惯动作、使用偏侧或发力方式有关">为什么问题会和习惯动作、使用偏侧或发力方式有关</option>
                <option value="为什么你的情况更像复合因素，不适合只盯一个点">为什么你的情况更像复合因素，不适合只盯一个点</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="testId">测试编号：</label>
            <input type="text" id="testId" value="LAA24001" readonly>
        </div>
        
        <button onclick="generateTestData()">生成测试数据</button>
        <button onclick="checkResult()">查看结果</button>
        <button onclick="activateTest()">开通测试</button>
    </div>
    
    <div id="resultContainer" class="result" style="display: none;">
        <h3>测试结果：</h3>
        <div id="testResult"></div>
    </div>
    
    <script src="js/second-layer-config-final-v3.json"></script>
    <script src="js/second-layer-engine-final-v3.js"></script>
    <script src="test-id.js"></script>
    <script src="data-manager.js"></script>
    
    <script>
        // 初始化测试ID管理器
        if (!window.TestIDManager) {
            window.TestIDManager = new TestIDManager();
        }
        
        // 初始化数据管理器
        if (!window.DataManager) {
            window.DataManager = new DataManager();
        }
        
        function generateTestData() {
            const inputData = {
                truthTendency: document.getElementById('truthTendency').value,
                mainProblemDirection: document.getElementById('mainProblemDirection').value,
                sideHint: document.getElementById('sideHint').value,
                complexityHint: document.getElementById('complexityHint').value,
                Q1: document.getElementById('Q1').value,
                Q2: document.getElementById('Q2').value,
                Q3: document.getElementById('Q3').value,
                Q4: document.getElementById('Q4').value
            };
            
            const testId = document.getElementById('testId').value;
            
            // 保存第二层结果
            const result = window.DataManager.saveSecondLayerResult(testId, inputData);
            
            if (result) {
                showResult('✅ 测试数据生成成功！\n\n' + 
                          '测试编号：' + testId + '\n' +
                          '模板匹配：' + (result.templateMatch.templateName || '未知') + '\n' +
                          '规则ID：' + (result.templateMatch.ruleId || '无') + '\n' +
                          '状态：' + (result.templateMatch.ruleStatus || '未知'));
            } else {
                showResult('❌ 测试数据生成失败，请检查控制台错误');
            }
        }
        
        function checkResult() {
            const testId = document.getElementById('testId').value;
            
            // 检查测试编号状态
            const status = window.checkTestIdStatus(testId);
            
            if (!status.exists) {
                showResult('❌ 测试编号不存在：' + testId);
                return;
            }
            
            if (!status.activated) {
                showResult('⚠️ 测试编号未开通：' + testId + '\n状态：' + status.status);
                return;
            }
            
            // 获取评估结果
            const result = window.DataManager.getAssessmentResult(testId);
            
            if (result) {
                let output = '✅ 结果获取成功！\n\n';
                output += '标题：' + result.title + '\n';
                output += '摘要：' + result.summary + '\n\n';
                output += '详细分析：\n';
                
                result.sections.forEach((section, index) => {
                    output += (index + 1) + '. ' + section.title + '：\n';
                    output += section.content + '\n\n';
                });
                
                output += '建议：\n';
                result.recommendations.forEach((rec, index) => {
                    output += (index + 1) + '. ' + rec + '\n';
                });
                
                showResult(output);
            } else {
                showResult('❌ 无法获取评估结果');
            }
        }
        
        function activateTest() {
            const testId = document.getElementById('testId').value;
            
            // 开通测试编号
            const record = window.TestIDManager.getTestRecord(testId);
            if (!record) {
                showResult('❌ 测试编号不存在：' + testId);
                return;
            }
            
            const updates = {
                status: 'activated',
                activatedAt: new Date().toISOString()
            };
            
            window.TestIDManager.updateTestRecord(testId, updates);
            showResult('✅ 测试编号已开通：' + testId);
        }
        
        function showResult(message) {
            document.getElementById('testResult').textContent = message;
            document.getElementById('resultContainer').style.display = 'block';
        }
        
        // 页面加载时初始化测试数据
        document.addEventListener('DOMContentLoaded', function() {
            console.log('final-v3集成测试页面已加载');
            
            // 确保测试编号存在
            const testId = 'LAA24001';
            const record = window.TestIDManager.getTestRecord(testId);
            if (!record) {
                // 创建测试记录
                window.TestIDManager.createTestRecord(testId, {
                    id: testId,
                    createdAt: new Date().toISOString(),
                    status: 'pending'
                });
                console.log('测试记录已创建：' + testId);
            }
        });
    </script>
</body>
</html>
