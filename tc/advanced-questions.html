<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>進階評估 v1.2</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f5f7fb; color: #1f2937;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
body { min-height: 100vh; }
.page { width: 100%; max-width: 560px; margin: 0 auto; padding: 16px 16px 28px; display: none; }
.page.active { display: block; }
.card { background: #fff; border-radius: 20px; padding: 20px 16px 18px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06); margin-bottom: 14px; }
.eyebrow { font-size: 12px; color: #6366f1; font-weight: 700; letter-spacing: .04em; margin-bottom: 10px; }
.title { font-size: 22px; line-height: 1.4; margin: 0 0 12px; font-weight: 700; color: #111827; }
.observation { background: #f8fafc; border: 1px solid #e5e7eb; color: #4b5563; border-radius: 14px; padding: 12px; margin-bottom: 16px; font-size: 14px; line-height: 1.7; }
.group-tag { display: inline-block; background: #eef2ff; color: #4f46e5; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.options-container { display: grid; gap: 12px; }
.option { width: 100%; background: #fff; border: 1.5px solid #dbe3ef; border-radius: 16px; padding: 14px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all .18s ease; text-align: left; font: inherit; color: inherit; }
.option:hover { border-color: #a5b4fc; transform: translateY(-1px); }
.option.selected { border-color: #4f46e5; background: #eef2ff; box-shadow: 0 0 0 3px rgba(79,70,229,.08); }
.option-indicator { width: 28px; height: 28px; border-radius: 999px; display: grid; place-items: center; flex: 0 0 28px; background: #f3f4f6; color: #374151; font-size: 13px; font-weight: 700; margin-top: 1px; }
.option.selected .option-indicator { background: #4f46e5; color: #fff; }
.option-text { font-size: 15px; line-height: 1.7; color: #111827; }
.topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.progress-wrap { flex: 1; }
.progress-text { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
.progress-bar { width: 100%; height: 8px; border-radius: 999px; background: #e5e7eb; overflow: hidden; }
.progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4f46e5, #3b82f6); transition: width .2s ease; }
.primary-btn, .secondary-btn { width: 100%; appearance: none; border: none; border-radius: 14px; min-height: 48px; padding: 0 16px; font-size: 15px; cursor: pointer; }
.primary-btn { background: #4f46e5; color: #fff; font-weight: 600; }
.primary-btn:disabled { opacity: .45; cursor: not-allowed; }
.secondary-btn { background: #fff; border: 1px solid #dbe3ef; color: #374151; }
.question-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
.tip { margin-top: 12px; text-align: center; font-size: 12px; color: #9ca3af; line-height: 1.6; }
.side-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
.side-btn { padding: 8px 4px; background: #f3f4f6; border: 1.5px solid transparent; border-radius: 10px; font-size: 12px; color: #374151; cursor: pointer; }
.side-btn.selected { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; font-weight: 600; }
.side-label { font-size: 12px; color: #6b7280; margin-top: 10px; }
</style>
</head>
<body>

<section id="question-page" class="page active">
<div class="topbar">
  <button id="prev-btn" class="secondary-btn" type="button">上一題</button>
  <div class="progress-wrap">
    <div id="progress-text" class="progress-text">第 1/16 題</div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
  </div>
</div>
<div class="card">
  <div class="eyebrow">進階評估 v1.2</div>
  <div id="group-tag" class="group-tag"></div>
  <h2 id="question-title" class="title"></h2>
  <div id="observation" class="observation"></div>
  <div id="options-container" class="options-container"></div>
  <div class="side-label" id="side-label">哪一側更明顯？</div>
  <div class="side-row" id="side-row">
    <button type="button" class="side-btn" data-side="left">左側</button>
    <button type="button" class="side-btn" data-side="right">右側</button>
    <button type="button" class="side-btn" data-side="bilateral">兩側</button>
    <button type="button" class="side-btn" data-side="unclear">不清楚</button>
  </div>
  <div class="question-actions">
    <button id="prev-btn-bottom" class="secondary-btn" type="button">上一題</button>
    <button id="next-btn" class="primary-btn" type="button" disabled>下一題</button>
  </div>
</div>
<div class="tip">點擊選項只會選中，不會自動跳題。請點擊"下一題"繼續。</div>
</section>

<script>
// ── v1.2 配置：16 题结构 ──────────────────────────────────────────────────────
const NEXT_PAGE = 'advanced-photo.html';
const STORAGE_KEY = 'laa_second_layer_answers_v12';
const PAYLOAD_KEY = 'laa_second_layer_payload_v12';

// 严重程度选项（每题答案 + 侧别）
const SEVERITY_OPTIONS = [
  { label: 'A', text: '沒有', value: 'none' },
  { label: 'B', text: '輕微', value: 'weak' },
  { label: 'C', text: '明顯', value: 'medium' },
  { label: 'D', text: '非常明顯', value: 'strong' }
];

// Q16 主诉优先题（特殊处理）
const Q16_OPTIONS = [
  { label: 'A', text: '笑起來嘴角歪 / 嘴角高低', value: 'mouth_corner' },
  { label: 'B', text: '下巴偏 / 下頜歪 / 咬肌不對稱', value: 'jaw_deviation' },
  { label: 'C', text: '法令紋 / 面中塌 / 蘋果肌撐不住', value: 'midface_support' },
  { label: 'D', text: '下頜線不清楚 / 下半臉鬆垮', value: 'jawline_sagging' },
  { label: 'E', text: '頭偏 / 肩頸不平 / 整體臉歪', value: 'head_neck_pull' }
];

// 16 题定义（5 组×3 题 + 1 主诉）
const QUESTIONS = [
  // T1｜口角启动型
  { id: 'T1_Q1', group: 'T1｜口角啟動型', title: '微笑時，你是否明顯感覺一側嘴角先動，另一側慢半拍？', observation: '重點看動態對稱性。', sidePrompt: '是哪一側先動？' },
  { id: 'T1_Q2', group: 'T1｜口角啟動型', title: '一側嘴角是不是更難抬起來，或者笑起來高低不一致？', observation: '嘴周肌肉啟動速度。', sidePrompt: '是哪一側更難抬起來？' },
  { id: 'T1_Q3', group: 'T1｜口角啟動型', title: '閉嘴時還好，但一笑臉就更歪？', observation: '靜態 vs 動態對比。', sidePrompt: '笑起來時偏向哪一側？' },
  // T2｜下颌偏移型
  { id: 'T2_Q1', group: 'T2｜下頜偏移型', title: '閉嘴時，你的下巴中線是否偏向一側？', observation: '下頜中線位置。', sidePrompt: '下巴偏向哪一側？' },
  { id: 'T2_Q2', group: 'T2｜下頜偏移型', title: '張嘴時，下巴會不會明顯往一邊偏？', observation: '張口軌跡。', sidePrompt: '張嘴時，下巴偏向哪一側？' },
  { id: 'T2_Q3', group: 'T2｜下頜偏移型', title: '咬牙時，是否一邊咬肌更鼓、更硬，或者你習慣單側咀嚼？', observation: '咬肌 + 咀嚼習慣。', sidePrompt: '是哪一側咬肌更鼓、更硬？' },
  // T3｜面中支撑弱型
  { id: 'T3_Q1', group: 'T3｜面中支撐弱型', title: '一側法令紋是否明顯更深？', observation: '面中支撐對比。', sidePrompt: '是哪一側法令紋更深？' },
  { id: 'T3_Q2', group: 'T3｜面中支撐弱型', title: '鼻翼旁或蘋果肌是否一側更塌、更低？', observation: '蘋果肌對稱性。', sidePrompt: '是哪一側蘋果肌更塌？' },
  { id: 'T3_Q3', group: 'T3｜面中支撐弱型', title: '笑起來時，是否感覺一側中面部撐不住、顯累？', observation: '動態面中支撐。', sidePrompt: '是哪一側中面部撐不住？' },
  // T4｜下颌缘松垮型
  { id: 'T4_Q1', group: 'T4｜下頜緣鬆垮型', title: '一側下頜線是否更模糊、不清楚？', observation: '下頜緣輪廓。', sidePrompt: '是哪一側下頜線更模糊？' },
  { id: 'T4_Q2', group: 'T4｜下頜緣鬆垮型', title: '嘴角下方到下巴這一段，是否一側更鬆、更沉？', observation: '口底支撐。', sidePrompt: '是哪一側更鬆、更沉？' },
  { id: 'T4_Q3', group: 'T4｜下頜緣鬆垮型', title: '低頭或疲憊時，下半臉是否更容易堆、顯寬、顯垮？', observation: '疲態下輪廓。', sidePrompt: '是哪一側下半臉更垮？' },
  // T5｜头颈牵拉型
  { id: 'T5_Q1', group: 'T5｜頭頸牽拉型', title: '你的頭是否總習慣偏向一邊，或者拍照很難擺正？', observation: '頭部位置習慣。', sidePrompt: '頭偏向哪一側？' },
  { id: 'T5_Q2', group: 'T5｜頭頸牽拉型', title: '一側脖子是否更緊，或者一邊肩更高？', observation: '頸肩張力分佈。', sidePrompt: '是哪一側脖子更緊？' },
  { id: 'T5_Q3', group: 'T5｜頭頸牽拉型', title: '你是否感覺一邊臉像被脖子或肩頸往下牽拉？', observation: '頭頸牽拉主觀感受。', sidePrompt: '是哪一側臉被牽拉？' },
  // Q16｜主诉优先题
  { id: 'Q16_focus', group: 'Q16｜主訴優先', title: '你現在最想優先改善的是哪一個？', observation: '選擇你最在意的方向。', isMainComplaint: true }
];

let currentIndex = 0;
let answers = {};
// 加载已保存的答案（支持中途退出再回来）
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) answers = JSON.parse(saved);
} catch (e) {}

const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');
const groupTag = document.getElementById('group-tag');
const questionTitle = document.getElementById('question-title');
const observation = document.getElementById('observation');
const optionsContainer = document.getElementById('options-container');
const sideRow = document.getElementById('side-row');
const prevBtn = document.getElementById('prev-btn');
const prevBtnBottom = document.getElementById('prev-btn-bottom');
const nextBtn = document.getElementById('next-btn');

function render() {
  const q = QUESTIONS[currentIndex];
  const saved = answers[q.id] || { severity: null, side: null };
  const isMain = !!q.isMainComplaint;
  const opts = isMain ? Q16_OPTIONS : SEVERITY_OPTIONS;

  progressText.textContent = `第 ${currentIndex + 1}/${QUESTIONS.length} 題`;
  progressFill.style.width = `${((currentIndex + 1) / QUESTIONS.length) * 100}%`;
  groupTag.textContent = q.group;
  questionTitle.textContent = q.title;
  observation.textContent = q.observation;

  // 渲染严重程度选项
  optionsContainer.innerHTML = '';
  opts.forEach((opt) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'option';
    if (saved.severity === opt.value) btn.classList.add('selected');
    btn.innerHTML = `<span class="option-indicator">${opt.label}</span><span class="option-text">${opt.text}</span>`;
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      answers[q.id] = answers[q.id] || {};
      answers[q.id].severity = opt.value;
      // Q16 不需要 side 字段
      if (!isMain && !answers[q.id].side) answers[q.id].side = 'unclear';
      saveAnswers();
      render();
    });
    optionsContainer.appendChild(btn);
  });

  // 渲染 side 选项（Q16 不显示）
  if (isMain) {
    sideRow.style.display = 'none';
  } else {
    sideRow.style.display = 'grid';
    // 用当前题目的 sidePrompt 覆盖默认文案
    const sideLabel = document.getElementById('side-label');
    if (sideLabel) sideLabel.textContent = q.sidePrompt || '哪一側更明顯？';
    sideRow.querySelectorAll('.side-btn').forEach((btn) => {
      const side = btn.dataset.side;
      btn.classList.toggle('selected', saved.side === side);
      btn.onclick = (e) => {
        e.preventDefault();
        answers[q.id] = answers[q.id] || {};
        answers[q.id].side = side;
        saveAnswers();
        render();
      };
    });
  }

  prevBtn.disabled = currentIndex === 0;
  prevBtnBottom.disabled = currentIndex === 0;
  nextBtn.disabled = !saved.severity || (!isMain && !saved.side);
  nextBtn.textContent = currentIndex === QUESTIONS.length - 1 ? '完成並進入下一步' : '下一題';
}

function saveAnswers() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
}

function goPrev() {
  if (currentIndex === 0) return;
  currentIndex -= 1;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  const q = QUESTIONS[currentIndex];
  const a = answers[q.id];
  if (!a || !a.severity) {
    alert('請先選擇一個答案');
    return;
  }
  if (!q.isMainComplaint && !a.side) {
    alert('請先選擇左右側');
    return;
  }

  if (currentIndex < QUESTIONS.length - 1) {
    currentIndex += 1;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // 提交：组装 v1.2 input schema
  const v12Answers = {};
  for (const tq of QUESTIONS) {
    if (tq.isMainComplaint) continue;
    const aa = answers[tq.id];
    v12Answers[tq.id] = {
      severity: aa.severity,
      side: aa.side || 'unclear',
    };
  }
  const q16Focus = answers['Q16_focus'] ? answers['Q16_focus'].severity : null;

  // 读取第一层（如果有）
  let firstLayerDirection = null;
  try {
    const l1 = JSON.parse(localStorage.getItem('laa_layer1_results') || '{}');
    firstLayerDirection = l1.direction || null;
  } catch (e) {}

  const payload = {
    version: 'second-layer-v1.2',
    completedAt: new Date().toISOString(),
    firstLayerDirection: firstLayerDirection,
    q16Focus: q16Focus,
    answers: v12Answers,
    rawAnswers: answers,
  };
  localStorage.setItem(PAYLOAD_KEY, JSON.stringify(payload));
  window.location.href = NEXT_PAGE;
}

prevBtn.addEventListener('click', function(e) { e.preventDefault(); goPrev(); });
prevBtnBottom.addEventListener('click', function(e) { e.preventDefault(); goPrev(); });
nextBtn.addEventListener('click', function(e) { e.preventDefault(); goNext(); });

render();
</script>
</body>
</html>
