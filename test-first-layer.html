<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试第一层12题功能</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test-case { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
        .option { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 2px solid #ddd;
            cursor: pointer;
        }
        .option:hover { border-color: #007bff; }
        .option.selected { border-color: #007bff; background: #e7f3ff; }
    </style>
</head>
<body>
    <h1>测试第一层12题功能</h1>
    
    <div class="test-case">
        <h2>测试1：直接加载questions.js并显示题目</h2>
        <button onclick="loadAndTestQuestions()">加载并测试questions.js</button>
        <div id="test1-result"></div>
    </div>
    
    <div class="test-case">
        <h2>测试2：模拟完整的题目页</h2>
        <div id="mock-question-page">
            <h2 id="mock-question-title">题目标题</h2>
            <div id="mock-observation">观察提示</div>
            <div id="mock-options-container"></div>
            <button onclick="mockNextQuestion()">下一题</button>
        </div>
        <div id="test2-result"></div>
    </div>
    
    <div class="test-case">
        <h2>测试3：检查app.js功能</h2>
        <button onclick="testAppJS()">测试app.js</button>
        <div id="test3-result"></div>
    </div>
    
    <script src="questions.js"></script>
    <script src="scoring.js"></script>
    <script src="results.js"></script>
    <script src="js/answer-hash-generator.js"></script>
    <script src="js/test-id.js"></script>
    <script src="app.js"></script>
    
    <script>
        let mockCurrentQuestion = 0;
        
        // 测试1：直接加载questions.js并显示题目
        function loadAndTestQuestions() {
            const result = document.getElementById('test1-result');
            
            if (typeof questions === 'undefined') {
                result.innerHTML = '<p class="error">❌ questions变量未定义</p>';
                return;
            }
            
            let html = `<p class="success">✅ questions.js已加载</p>
                       <p>题目总数: ${questions.length}</p>
                       <h3>前3题预览：</h3>`;
            
            for (let i = 0; i < Math.min(3, questions.length); i++) {
                const q = questions[i];
                html += `<div style="margin: 20px 0; padding: 15px; background: white; border-radius: 8px;">
                        <h4>第${i+1}题: ${q.title}</h4>
                        <p><em>${q.observation}</em></p>
                        <p>选项(${q.options.length}个):</p>
                        <ul>`;
                
                q.options.forEach((option, idx) => {
                    html += `<li>${idx+1}. ${option}</li>`;
                });
                
                html += `</ul></div>`;
            }
            
            result.innerHTML = html;
        }
        
        // 测试2：模拟完整的题目页
        function mockNextQuestion() {
            if (mockCurrentQuestion >= questions.length) {
                mockCurrentQuestion = 0;
            }
            
            const question = questions[mockCurrentQuestion];
            const title = document.getElementById('mock-question-title');
            const observation = document.getElementById('mock-observation');
            const container = document.getElementById('mock-options-container');
            const result = document.getElementById('test2-result');
            
            title.textContent = `第${mockCurrentQuestion + 1}题: ${question.title}`;
            observation.textContent = question.observation;
            
            container.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = `${index + 1}. ${option}`;
                
                optionElement.addEventListener('click', () => {
                    // 移除其他选项的选中状态
                    container.querySelectorAll('.option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    
                    // 选中当前选项
                    optionElement.classList.add('selected');
                    
                    result.innerHTML = `<p class="success">✅ 选择了第${mockCurrentQuestion + 1}题的第${index + 1}个选项</p>`;
                });
                
                container.appendChild(optionElement);
            });
            
            mockCurrentQuestion++;
            
            if (mockCurrentQuestion >= questions.length) {
                result.innerHTML += '<p class="success">✅ 所有题目测试完成！</p>';
            }
        }
        
        // 测试3：检查app.js功能
        function testAppJS() {
            const result = document.getElementById('test3-result');
            let html = '<h3>app.js功能检查：</h3>';
            
            // 检查关键函数
            const functions = [
                'initApp', 'startTest', 'showQuestion', 'selectOption',
                'showPreviousQuestion', 'showNextQuestion', 'calculateAndShowResults',
                'restartTest', 'showAdvancedAssessment'
            ];
            
            functions.forEach(funcName => {
                if (typeof window[funcName] === 'function') {
                    html += `<p class="success">✅ ${funcName} 函数存在</p>`;
                } else {
                    html += `<p class="error">❌ ${funcName} 函数不存在</p>`;
                }
            });
            
            // 测试showQuestion函数
            if (typeof showQuestion === 'function') {
                html += '<p>测试showQuestion函数...</p>';
                
                try {
                    // 创建一个测试容器
                    const testContainer = document.createElement('div');
                    testContainer.id = 'test-options-container';
                    document.body.appendChild(testContainer);
                    
                    // 临时替换全局变量
                    const originalContainer = window.optionsContainer;
                    const originalTitle = window.questionTitle;
                    const originalObservation = window.observation;
                    
                    const testTitle = document.createElement('h2');
                    testTitle.id = 'test-question-title';
                    
                    const testObservation = document.createElement('div');
                    testObservation.id = 'test-observation';
                    
                    window.optionsContainer = testContainer;
                    window.questionTitle = testTitle;
                    window.observation = testObservation;
                    
                    // 调用函数
                    showQuestion(0);
                    
                    const options = testContainer.querySelectorAll('.option');
                    if (options.length > 0) {
                        html += `<p class="success">✅ showQuestion成功生成${options.length}个选项</p>`;
                    } else {
                        html += `<p class="error">❌ showQuestion未生成选项</p>`;
                    }
                    
                    // 清理
                    testContainer.remove();
                    if (originalContainer) window.optionsContainer = originalContainer;
                    if (originalTitle) window.questionTitle = originalTitle;
                    if (originalObservation) window.observation = originalObservation;
                    
                } catch (error) {
                    html += `<p class="error">❌ showQuestion测试失败: ${error.message}</p>`;
                }
            }
            
            result.innerHTML = html;
        }
        
        // 页面加载时自动测试
        document.addEventListener('DOMContentLoaded', function() {
            console.log('测试页面已加载');
            
            setTimeout(() => {
                loadAndTestQuestions();
                mockNextQuestion(); // 显示第一题
            }, 500);
        });
    </script>
</body>
</html>
