<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试数据生成器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-case {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .input-group {
            margin: 10px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .test-scenario {
            background: #e8f4fd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid #007bff;
        }
    </style>
</head>
<body>
    <h1>测试数据生成器 - final-v3引擎集成</h1>
    
    <div class="test-scenario">
        <h3>测试场景：T1-R01规则匹配</h3>
        <p>生成符合T1-R01规则的数据，测试引擎是否能正确匹配</p>
    </div>
    
    <div class="test-case">
        <h2>生成测试数据</h2>
        
        <div class="input-group">
            <label for="testId">测试编号：</label>
            <input type="text" id="testId" value="LAA24001">
        </div>
        
        <div class="input-group">
            <label for="truthTendency">真假倾向：</label>
            <select id="truthTendency">
                <option value="假性倾向">假性倾向</option>
                <option value="混合倾向" selected>混合倾向</option>
                <option value="真性倾向">真性倾向</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="mainProblemDirection">主问题方向：</label>
            <select id="mainProblemDirection">
                <option value="肌肉-软组织方向">肌肉-软组织方向</option>
                <option value="筋膜-位置牵拉方向">筋膜-位置牵拉方向</option>
                <option value="动态控制方向" selected>动态控制方向</option>
                <option value="体态代偿方向">体态代偿方向</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="sideHint">左右侧提示：</label>
            <select id="sideHint">
                <option value="左侧更明显">左侧更明显</option>
                <option value="右侧更明显" selected>右侧更明显</option>
                <option value="暂不明确">暂不明确</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="complexityHint">复杂度提示：</label>
            <select id="complexityHint">
                <option value="一般初筛" selected>一般初筛</option>
                <option value="建议进一步评估">建议进一步评估</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q1">Q1：</label>
            <select id="Q1">
                <option value="静态拍照时更明显">静态拍照时更明显</option>
                <option value="微笑或说话时更明显" selected>微笑或说话时更明显</option>
                <option value="咀嚼或用力时更明显">咀嚼或用力时更明显</option>
                <option value="每天看起来不太一样，不太稳定">每天看起来不太一样，不太稳定</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q2">Q2：</label>
            <select id="Q2">
                <option value="单侧咀嚼比较明显">单侧咀嚼比较明显</option>
                <option value="单侧托脸、侧睡或偏向一侧支撑比较明显">单侧托脸、侧睡或偏向一侧支撑比较明显</option>
                <option value="某一侧表情或发力更常用" selected>某一侧表情或发力更常用</option>
                <option value="没有明显感觉，或不确定">没有明显感觉，或不确定</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q3">Q3：</label>
            <select id="Q3">
                <option value="长期都比较稳定，位置和感觉差不多">长期都比较稳定，位置和感觉差不多</option>
                <option value="最近越来越明显">最近越来越明显</option>
                <option value="有时觉得左边明显，有时又觉得右边明显">有时觉得左边明显，有时又觉得右边明显</option>
                <option value="静态还好，但一动起来就更明显" selected>静态还好，但一动起来就更明显</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="Q4">Q4：</label>
            <select id="Q4">
                <option value="为什么一边脸看起来更大">为什么一边脸看起来更大</option>
                <option value="为什么两边位置/高低/线条方向不一样" selected>为什么两边位置/高低/线条方向不一样</option>
                <option value="为什么静态还好，一做动作差异就出来">为什么静态还好，一做动作差异就出来</option>
                <option value="为什么问题会和习惯动作、使用偏侧或发力方式有关">为什么问题会和习惯动作、使用偏侧或发力方式有关</option>
                <option value="为什么你的情况更像复合因素，不适合只盯一个点">为什么你的情况更像复合因素，不适合只盯一个点</option>
            </select>
        </div>
        
        <button onclick="generateTestData()">生成测试数据</button>
        <button onclick="activateTest()">开通测试</button>
        <button onclick="testRealEngine()">测试真实引擎</button>
        <button onclick="clearData()">清除数据</button>
    </div>
    
    <div id="resultContainer" class="result" style="display: none;">
        <h3>测试结果：</h3>
        <div id="testResult"></div>
    </div>
    
    <script src="test-id.js"></script>
    <script src="js/engine-loader.js"></script>
    
    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('测试数据生成器已加载');
            
            // 加载引擎
            await window.loadSecondLayerEngine();
            console.log('第二层结果引擎已加载');
        });
        
        // 生成测试数据
        async function generateTestData() {
            const testId = document.getElementById('testId').value.trim().toUpperCase();
            
            if (!/^LAA\d{5}$/.test(testId)) {
                showResult('❌ 测试编号格式不正确，应为 LAA 后跟5位数字');
                return;
            }
            
            // 收集输入数据
            const inputData = {
                truthTendency: document.getElementById('truthTendency').value,
                mainProblemDirection: document.getElementById('mainProblemDirection').value,
                sideHint: document.getElementById('sideHint').value,
                complexityHint: document.getElementById('complexityHint').value,
                Q1: document.getElementById('Q1').value,
                Q2: document.getElementById('Q2').value,
                Q3: document.getElementById('Q3').value,
                Q4: document.getElementById('Q4').value
            };
            
            // 创建测试记录
            const record = {
                id: testId,
                createdAt: new Date().toISOString(),
                status: 'pending',
                userData: {
                    truthTendency: inputData.truthTendency,
                    mainProblemDirection: inputData.mainProblemDirection,
                    sideHint: inputData.sideHint,
                    complexityHint: inputData.complexityHint,
                    basic_answers: ['A', 'B', 'C'], // 模拟基础问卷答案
                    advanced_answers: [inputData.Q1, inputData.Q2, inputData.Q3, inputData.Q4],
                    basic_completed_at: new Date().toISOString(),
                    advanced_completed_at: new Date().toISOString()
                }
            };
            
            // 保存到TestIDManager
            window.TestIDManager.createTestRecord(testId, record);
            
            showResult(`✅ 测试数据生成成功！\n\n` +
                      `测试编号：${testId}\n` +
                      `状态：${record.status}\n` +
                      `数据已保存到localStorage\n\n` +
                      `输入数据：\n${JSON.stringify(inputData, null, 2)}`);
        }
        
        // 开通测试
        function activateTest() {
            const testId = document.getElementById('testId').value.trim().toUpperCase();
            
            const record = window.TestIDManager.getTestRecord(testId);
            if (!record) {
                showResult('❌ 测试编号不存在，请先生成测试数据');
                return;
            }
            
            // 更新状态为已开通
            const updates = {
                status: 'activated',
                activatedAt: new Date().toISOString()
            };
            
            window.TestIDManager.updateTestRecord(testId, updates);
            
            showResult(`✅ 测试编号已开通：${testId}\n` +
                      `状态：activated\n` +
                      `开通时间：${new Date().toISOString()}`);
        }
        
        // 测试真实引擎
        async function testRealEngine() {
            const testId = document.getElementById('testId').value.trim().toUpperCase();
            
            const record = window.TestIDManager.getTestRecord(testId);
            if (!record) {
                showResult('❌ 测试编号不存在，请先生成测试数据');
                return;
            }
            
            if (record.status !== 'activated') {
                showResult('⚠️ 测试编号未开通，请先开通测试');
                return;
            }
            
            // 构建输入数据
            const inputData = {
                truthTendency: record.userData.truthTendency,
                mainProblemDirection: record.userData.mainProblemDirection,
                sideHint: record.userData.sideHint,
                complexityHint: record.userData.complexityHint,
                Q1: record.userData.advanced_answers[0],
                Q2: record.userData.advanced_answers[1],
                Q3: record.userData.advanced_answers[2],
                Q4: record.userData.advanced_answers[3]
            };
            
            // 使用真实引擎生成结果
            const engineResult = window.generateRealResult(inputData);
            
            if (engineResult.error) {
                showResult(`❌ 引擎生成结果失败：\n${engineResult.message}\n${engineResult.fallback}`);
                return;
            }
            
            const result = engineResult.result;
            
            let output = `✅ 真实引擎测试成功！\n\n`;
            output += `测试编号：${testId}\n`;
            output += `模板匹配：${result.templateMatch.matched ? '✓ 已匹配' : '▢ 未完全匹配'}\n`;
            output += `规则ID：${result.templateMatch.ruleId || '无'}\n`;
            output += `模板名称：${result.templateMatch.templateName || '未指定'}\n\n`;
            output += `生成结果：\n`;
            output += `• 评估ID：${result.assessmentId}\n`;
            output += `• 生成时间：${result.timestamp}\n\n`;
            output += `分析内容：\n${result.generatedResult.analysis || '无'}\n\n`;
            output += `分流日志：\n${result.priorityLog.join('\n')}`;
            
            showResult(output);
        }
        
        // 清除数据
        function clearData() {
            const testId = document.getElementById('testId').value.trim().toUpperCase();
            
            // 从TestIDManager删除记录
            const data = window.TestIDManager.getStorageData();
            if (data.testRecords && data.testRecords[testId]) {
                delete data.testRecords[testId];
                window.TestIDManager.saveStorageData(data);
                showResult(`✅ 测试数据已清除：${testId}`);
            } else {
                showResult(`ℹ️ 未找到测试数据：${testId}`);
            }
        }
        
        // 显示结果
        function showResult(message) {
            document.getElementById('testResult').textContent = message;
            document.getElementById('resultContainer').style.display = 'block';
        }
    </script>
</body>
</html>
