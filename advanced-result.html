<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>完整进阶结果</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f5f7fb; color: #1f2937;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
body { min-height: 100vh; }
.page { width: 100%; max-width: 560px; margin: 0 auto; padding: 16px 16px 28px; }
.card { background: #fff; border-radius: 20px; padding: 20px 16px 18px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06); margin-bottom: 14px; }
.eyebrow { font-size: 12px; color: #6366f1; font-weight: 700; letter-spacing: .04em; margin-bottom: 10px; }
.title { margin: 0 0 8px; font-size: 24px; line-height: 1.4; color: #111827; }
.subtext { color: #6b7280; font-size: 14px; line-height: 1.75; }
.result-section { margin-bottom: 20px; }
.result-section:last-child { margin-bottom: 0; }
.section-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title .icon { font-size: 18px; }
.result-box { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; }
.result-item { margin-bottom: 12px; }
.result-item:last-child { margin-bottom: 0; }
.result-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
.result-value { font-size: 15px; line-height: 1.6; color: #111827; }
.highlight { background: #eef2ff; border-color: #818cf8; }
.highlight .result-value { color: #4f46e5; font-weight: 600; }
.warning-box { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 14px; padding: 14px; margin-top: 14px; }
.warning-title { font-size: 14px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
.warning-text { font-size: 13px; line-height: 1.6; color: #92400e; }
.tip { margin-top: 16px; text-align: center; font-size: 12px; color: #9ca3af; line-height: 1.6; }
</style>
</head>
<body>
<div class="page">
<div class="card">
  <div class="eyebrow">LAA · 完整进阶结果</div>
  <h1 class="title" id="mainTitle">你的完整分析结果</h1>
  <p class="subtext" id="mainDesc">以下是基于第二层问卷的详细分析结果</p>
</div>

<div id="resultContent">
  <!-- 核心参与层 -->
  <div class="card">
    <div class="result-section">
      <div class="section-title"><span class="icon">🎯</span> 核心参与层</div>
      <div class="result-box">
        <div class="result-item">
          <div class="result-label">判断类型</div>
          <div id="templateType" class="result-value">--</div>
        </div>
        <div class="result-item">
          <div class="result-label">主要参与层</div>
          <div id="mainLayer" class="result-value">--</div>
        </div>
        <div class="result-item">
          <div class="result-label">触发场景</div>
          <div id="triggerScene" class="result-value">--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 外观原因 -->
  <div class="card">
    <div class="result-section">
      <div class="section-title"><span class="icon">🔍</span> 为什么外观看起来会这样</div>
      <div class="result-box">
        <div id="appearanceReason" class="result-value">--</div>
      </div>
    </div>
  </div>

  <!-- 优先处理侧 -->
  <div class="card">
    <div class="result-section">
      <div class="section-title"><span class="icon">⚖️</span> 表现侧与优先处理侧</div>
      <div class="result-box">
        <div class="result-item">
          <div class="result-label">表现侧</div>
          <div id="exhibitSide" class="result-value">--</div>
        </div>
        <div class="result-item">
          <div class="result-label">优先处理侧</div>
          <div id="prioritySide" class="result-value highlight"><span class="result-value" id="prioritySideValue">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 训练安排 -->
  <div class="card">
    <div class="result-section">
      <div class="section-title"><span class="icon">📋</span> 训练安排提示</div>
      <div class="result-box">
        <div id="trainingTips" class="result-value">--</div>
      </div>
    </div>
  </div>

  <!-- 常见误判 -->
  <div class="card">
    <div class="result-section">
      <div class="section-title"><span class="icon">⚠️</span> 最容易误判或练错的点</div>
      <div class="warning-box">
        <div id="commonMistakes" class="warning-text">--</div>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="tip">结果仅供自测参考，如需更精准分析建议咨询专业人士。</div>
</div>
</div>

<script>
const STORAGE_KEY = 'laa_second_layer_payload';

function readPayload() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function getAnswerValue(payload, qid) {
  if (!payload || !payload.answers || !payload.answers[qid]) return '';
  return payload.answers[qid].value || '';
}

function render() {
  const payload = readPayload();
  if (!payload) {
    document.getElementById('resultContent').innerHTML = '<div class="card"><p class="subtext">暂无结果数据，请先完成第二层问卷。</p></div>';
    return;
  }

  const q1 = getAnswerValue(payload, 'Q1');
  const q2 = getAnswerValue(payload, 'Q2');
  const q3 = getAnswerValue(payload, 'Q3');
  const q4 = getAnswerValue(payload, 'Q4');

  // 判断模板类型
  let templateType = '静态轮廓型';
  let mainLayer = '软组织张力';
  let triggerScene = '静态拍照';

  if (q3 === 'getting_worse_recently' || q3 === 'left_right_fluctuate') {
    templateType = '复合波动型';
  }
  if (q1 === 'smile_or_talk' || q2 === 'one_side_expression' || q3 === 'dynamic_amplified') {
    templateType = '口周动态控制失衡型';
    mainLayer = '表情肌/口周肌';
    triggerScene = '微笑、说话时';
  } else if (q1 === 'chew_or_force' || q2 === 'one_side_chew') {
    templateType = '咀嚼代偿型';
    mainLayer = '咬肌/下颌肌';
    triggerScene = '咀嚼、用力时';
  } else if (q2 === 'one_side_support') {
    templateType = '位置牵拉型';
    mainLayer = '颈肩/支撑肌';
    triggerScene = '头颈位置变化时';
  }

  document.getElementById('templateType').textContent = templateType;
  document.getElementById('mainLayer').textContent = mainLayer;
  document.getElementById('triggerScene').textContent = triggerScene;

  // 外观原因
  let appearanceReason = '你的差异主要来自软组织张力偏差，表现为静态下的左右不对称。';
  if (q1 === 'smile_or_talk') {
    appearanceReason = '你的差异主要与表情肌控制有关，在动态表情时会更加明显。';
  } else if (q1 === 'chew_or_force') {
    appearanceReason = '你的差异主要与咀嚼侧发力偏多有关，导致咬肌和下颌肌发达程度不同。';
  } else if (q2 === 'one_side_support') {
    appearanceReason = '你的差异可能与头颈支撑姿势有关，长期单侧支撑导致软组织被牵拉偏移。';
  }
  document.getElementById('appearanceReason').textContent = appearanceReason;

  // 表现侧与优先处理侧
  let exhibitSide = '右侧更明显';
  let prioritySide = '左侧（优先处理）';
  if (q2 === 'one_side_chew' || q2 === 'one_side_support') {
    exhibitSide = '患侧更明显';
    prioritySide = '需要评估后确定';
  }
  document.getElementById('exhibitSide').textContent = exhibitSide;
  document.getElementById('prioritySideValue').textContent = prioritySide;

  // 训练提示
  let trainingTips = '建议先从基础的面部肌群感知练习开始，逐步建立正确的发力习惯。';
  if (q1 === 'smile_or_talk') {
    trainingTips = '建议进行表情肌控制练习，包括对称微笑训练和口周肌群感知练习。';
  } else if (q1 === 'chew_or_force') {
    trainingTips = '建议进行咀嚼肌放松和两侧均衡发力练习，减少单侧代偿。';
  } else if (q2 === 'one_side_support') {
    trainingTips = '建议进行头颈姿势矫正和颈肩肌群松解，改变不良支撑习惯。';
  }
  document.getElementById('trainingTips').textContent = trainingTips;

  // 常见误判
  let commonMistakes = '1. 只看静态照片判断，忽略了动态因素\n2. 只处理表现侧而忽略了真正的问题源头\n3. 训练强度过大，反而加重了不对称';
  if (q3 === 'left_right_fluctuate') {
    commonMistakes = '1. 以为自己的问题是固定的，实际上有波动\n2. 容易误判表现侧，需要更细致的评估\n3. 训练方案需要根据波动情况灵活调整';
  }
  document.getElementById('commonMistakes').textContent = commonMistakes;
}

render();
</script>
</body>
</html>
