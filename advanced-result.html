<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAA 完整进阶结果</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: #f5f7fb;
  color: #1f2937;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
}
body { min-height: 100vh; }
.page {
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 16px 16px 28px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px 16px 18px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  margin-bottom: 14px;
}
.eyebrow {
  font-size: 12px;
  color: #6366f1;
  font-weight: 700;
  letter-spacing: .04em;
  margin-bottom: 10px;
}
.title {
  margin: 0 0 8px;
  font-size: 24px;
  line-height: 1.4;
  color: #111827;
}
.subtitle {
  color: #4f46e5;
  font-size: 16px;
  line-height: 1.6;
  font-weight: 600;
  margin: 0 0 16px;
}
.text {
  color: #4b5563;
  font-size: 14px;
  line-height: 1.85;
}
.section {
  margin-top: 14px;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 14px;
}
.section-title {
  margin: 0 0 10px;
  font-size: 16px;
  color: #111827;
}
.tag {
  display: inline-block;
  border-radius: 999px;
  background: #eef2ff;
  color: #4338ca;
  font-size: 12px;
  padding: 6px 10px;
  margin-bottom: 10px;
}
.secondary-btn {
  width: 100%;
  appearance: none;
  border: 1px solid #dbe3ef;
  background: #fff;
  color: #374151;
  border-radius: 14px;
  min-height: 48px;
  font-size: 15px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="eyebrow">LAA · 完整进阶结果</div>
    <h1 id="headline" class="title">正在生成结果</h1>
    <div id="subheadline" class="subtitle"></div>
    <p id="introText" class="text"></p>

    <div class="section">
      <div class="tag">核心参与层</div>
      <h2 class="section-title">更可能的核心参与层</h2>
      <p id="layerText" class="text"></p>
    </div>

    <div class="section">
      <div class="tag">外观原因</div>
      <h2 class="section-title">为什么外观看起来会这样</h2>
      <p id="reasonText" class="text"></p>
    </div>

    <div class="section">
      <div class="tag">处理顺序</div>
      <h2 class="section-title">优先处理方向</h2>
      <p id="priorityText" class="text"></p>
    </div>

    <div class="section">
      <div class="tag">注意点</div>
      <h2 class="section-title">最容易误判 / 练错的点</h2>
      <p id="warningText" class="text"></p>
    </div>
  </div>

  <div class="card">
    <button class="secondary-btn" type="button" onclick="window.location.href='advanced-questions.html'">返回上一页</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'laa_second_layer_payload';

function readPayload() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function getAnswerValue(payload, qid) {
  if (!payload || !payload.answers || !payload.answers[qid]) return '';
  return payload.answers[qid].value || '';
}

function decideTemplate(payload) {
  const q1 = getAnswerValue(payload, 'Q1');
  const q2 = getAnswerValue(payload, 'Q2');
  const q3 = getAnswerValue(payload, 'Q3');

  if (q3 === 'getting_worse_recently' || q3 === 'left_right_fluctuate') return '复合波动型';
  if (q1 === 'smile_or_talk' || q2 === 'one_side_expression' || q3 === 'dynamic_amplified') return '口周 / 口角动态控制失衡型';
  if (q1 === 'chew_or_force' || q2 === 'one_side_chew') return '咀嚼 / 下颌使用代偿型';
  if (q2 === 'one_side_support') return '位置牵拉 / 头颈支撑牵连型';
  return '静态轮廓 / 软组织张力偏差型';
}

function buildContent(template) {
  if (template === '口周 / 口角动态控制失衡型') {
    return {
      title: '你的情况更偏动态控制失衡',
      sub: '更容易在微笑、说话或表情启动时把左右差异放大',
      intro: '从补充评估看，你的问题不只是静态轮廓差，更像在动态状态下，一侧更容易上提、外拉、启动更快，另一侧则更慢、更弱或更难稳定配合。',
      layer: '第一阶段更建议先看口周—口角动态控制层，尤其是口角外拉与口周稳定的协同关系，而不是一开始就把它理解成纯骨性问题。',
      reason: '你在静态时未必最明显，但一动起来差异会被迅速放大，所以外观看起来更像“一边会动、一边不太跟得上”，而不是单纯一边大一边小。',
      priority: '优先顺序更建议是：先稳定动态控制层，再看口周协同，最后再决定是否需要进一步追溯到更深层的使用代偿。',
      warning: '这一类最容易误判成“纯轮廓不对称”，然后一开始就盯着厚薄或骨感去处理，反而忽略了真正的问题是在动态控制链。'
    };
  }

  if (template === '咀嚼 / 下颌使用代偿型') {
    return {
      title: '你的情况更偏下颌使用代偿',
      sub: '更容易在咀嚼、发力或单侧使用时暴露',
      intro: '从补充评估看，你的差异更像与单侧发力、咀嚼路径、下颌偏载有关，外观看起来会更偏“长期用出来的偏差”。',
      layer: '第一阶段更建议先看下颌—咀嚼使用代偿层，而不是直接把它理解成静态脂肪、软组织厚薄差。',
      reason: '如果一侧长期承担更多咬合或发力任务，就更容易出现一侧更厚、更硬、更鼓，另一侧相对更松或存在感更弱的表现。',
      priority: '优先顺序更建议是：先处理单侧使用偏载，再看下颌稳定层，最后再判断是否已经影响到口周协同。',
      warning: '这一类最容易练错的地方，是一开始就盯着脸部表面做对称训练，但没有先解决单侧咀嚼和发力路径的问题。'
    };
  }

  if (template === '位置牵拉 / 头颈支撑牵连型') {
    return {
      title: '你的情况更偏位置牵拉与支撑牵连',
      sub: '更像脸部表现受到头颈支撑和上游关系影响',
      intro: '从补充评估看，你的表现更像不是单纯脸上的问题，而是头颈支撑、单侧托脸、侧睡或偏向一侧支撑的关系在持续参与。',
      layer: '第一阶段更建议先看头颈支撑肌群与位置牵拉链，而不是一开始只盯着局部软组织厚薄差。',
      reason: '当上游支撑长期失衡时，脸上的外观就可能被“带偏”，看起来像一边更紧、更提、更利，另一边更松、更垮、更散。',
      priority: '优先顺序更建议是：先处理支撑与牵拉，再看局部脸部协同，最后再决定是否需要更细分的动态矫正。',
      warning: '这一类最容易误判成“我就是某边脸更大”，但如果只盯脸而不处理支撑来源，结果常常会反复。'
    };
  }

  if (template === '复合波动型') {
    return {
      title: '你的情况更偏复合波动型',
      sub: '目前不适合用单一原因直接解释',
      intro: '从补充评估看，你的情况里已经出现了波动、加重或左右不稳定的信号，说明当前很可能不是单一主线，而是多条因素叠加。',
      layer: '第一阶段更建议先从复合代偿层和基础稳定层入手，先把波动减下来，再继续细分到底是动态、使用偏载还是支撑牵拉占主导。',
      reason: '你之所以会觉得有时左边明显、有时右边明显，或者最近越来越明显，通常就意味着不能只靠一张静态照片去下结论。',
      priority: '优先顺序更建议是：先降低波动和混乱感，再看最稳定的暴露场景，最后再做更细分的主模板判断。',
      warning: '这一类最容易误判成“我今天看着像这个，明天又像那个”，然后不停换判断逻辑，反而把真正主线越看越乱。'
    };
  }

  return {
    title: '你的情况更偏静态轮廓 / 软组织张力偏差',
    sub: '更容易在静态拍照时看到差异',
    intro: '从补充评估看，你的差异更偏静态表现，通常更像一侧更紧、更顶、更收，另一侧更松、更散、更容易显得存在感不足。',
    layer: '第一阶段更建议先看软组织张力层和静态轮廓支撑层，而不是先把它理解成纯动态控制问题。',
    reason: '如果问题主要在静态拍照时最明显，而且长期相对稳定，那么外观看起来通常更像“松紧差、顶垮差、收放差”，而不是单纯一动才偏。',
    priority: '优先顺序更建议是：先判断哪一侧更紧、哪一侧更松，再做静态支撑层处理，最后再看是否需要补充动态协同。',
    warning: '这一类最容易误判成“纯脂肪问题”或“单纯骨性问题”，从而忽略了软组织张力和静态支撑关系。'
  };
}

function render() {
  const payload = readPayload();
  const template = decideTemplate(payload);
  const content = buildContent(template);

  document.getElementById('headline').textContent = content.title;
  document.getElementById('subheadline').textContent = content.sub;
  document.getElementById('introText').textContent = content.intro;
  document.getElementById('layerText').textContent = content.layer;
  document.getElementById('reasonText').textContent = content.reason;
  document.getElementById('priorityText').textContent = content.priority;
  document.getElementById('warningText').textContent = content.warning;
}

render();
</script>
</body>
</html>
