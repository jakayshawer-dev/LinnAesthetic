if (sessionStorage.getItem('advancedUnlocked') !== '1') {
  window.location.href = 'advanced-unlock.html';
}

const STORAGE_KEY = 'laa_second_layer_payload';

function readPayload() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function getAnswerValue(payload, qid) {
  if (!payload || !payload.answers || !payload.answers[qid]) return '';
  return payload.answers[qid].value || '';
}

      q4_logic: '从整体来看，你的问题属于"多因素复合波动型"——静态外观、动态放大、上游牵连可能同时存在，需要先梳理清楚各因素的权重关系，再制定处理顺序。'
    },
    exhibitSide(l1) { return '暂不明確，波动期两侧皆有参与'; },
    prioritySide(l1) {
      return '暂无法直接确认，需综合评估后确定优先处理侧——先抓最稳定的主线';
    },

      default: '建议先从整体评估开始，理清各因素的参与权重后再制定分步处理方案。切忌同时做太多练习，以免多因素相互干扰。建议找专业评估后按顺序处理。',
      q4_why_bigger: '训练重点在于"先梳理后行动"：目前多因素叠加，不建议自行训练。先通过专业评估确认最需要优先处理的那条主线，再按顺序进行。',
      q4_priority: '优先处理：先做整体评估，确认"表现侧"和"优先处理侧"的区别——在复合型中，这两侧很可能不是同一侧。按顺序处理，不要同时开始多个方向的练习。'
    },

      default: '1. 以为"多个问题同时处理"效果更好，实际上互相干扰\n2. 在没有分辨清楚主次的情况下盲目训练\n3. 只处理了其中一个问题就以为好了，但其他因素还在持续影响',

    }
  }
};

// ============================================================
// 模板路由（优先级：Q3 > Q2 > Q1 > L1校正）
// ============================================================
function decideTemplate(q1, q2, q3, q4, l1) {
  // 第一优先：Q3 — 波动/加重直接判 T5（立即终结，不走后续判断）
  if (q3 === 'getting_worse_recently' || q3 === 'left_right_fluctuate') {
    return 'T5';
  }

  // 第二优先：Q2 — 单因素直接判（立即终结，不走 Q1 判断）
  if (q2 === 'one_side_support') {
    return 'T4';
  }
  if (q2 === 'one_side_expression') {
    return 'T1'; // 表情偏侧，路由 T1
  }
  if (q2 === 'one_side_chew') {
    return 'T2'; // 咀嚼偏侧，路由 T2（覆盖 Q1 结果）
  }

  // 第三优先：Q1 — 基础路由
  if (q1 === 'smile_or_talk') {
    return 'T1';
  }
  if (q1 === 'chew_or_force') {
    return 'T2';
  }

  // 默认：Q1 = static_photo 或其他 → T3 静态轮廓
  return 'T3';
}

// 获取 Q4 加权的描述内容
function getQ4WeightedContent(templateKey, q4, field, l1) {
  const tpl = TEMPLATES[templateKey];
  const q4Key = 'q4_' + q4;
  if (tpl[field] && typeof tpl[field] === 'object') {
    if (tpl[field][q4Key]) return tpl[field][q4Key];
  }
  if (typeof tpl[field] === 'object') {
    return tpl[field].default || '';
  }
  if (typeof tpl[field] === 'function') {
    return tpl[field](l1);
  }
  return '';
}

// ============================================================
// 主渲染函数
// ============================================================
function render() {
  const payload = readPayload();
  if (!payload) {
    document.getElementById('resultContent').innerHTML =
      '<div class="card"><p class="subtext">暂无结果数据，请先完成第二层问卷。</p></div>';
    return;
  }

  // 读取答案
  const q1 = getAnswerValue(payload, 'Q1'); // smile_or_talk | chew_or_force | static_photo | unstable_day_to_day
  const q2 = getAnswerValue(payload, 'Q2'); // one_side_chew | one_side_support | one_side_expression | uncertain
  const q3 = getAnswerValue(payload, 'Q3'); // stable_long_term | getting_worse_recently | left_right_fluctuate | dynamic_amplified
  const q4 = getAnswerValue(payload, 'Q4'); // why_bigger | why_dynamic_asymmetry | why_cannot_tell_side | priority_and_order | overall_logic

  // 读取第一层结果（用于侧别和方向校正）
  const l1 = readLayer1Results();

  // 决定模板
  const templateKey = decideTemplate(q1, q2, q3, q4, l1);
  const tpl = TEMPLATES[templateKey];

  // 填充：模板类型 / 主要参与层 / 触发场景
  document.getElementById('templateType').textContent = tpl.label;
  document.getElementById('mainLayer').textContent = tpl.mainLayer;
  document.getElementById('triggerScene').textContent = tpl.triggerScene;

  // 填充：外观原因（Q4 加权）
  const appearanceText = getQ4WeightedContent(templateKey, q4, 'appearance', l1);
  document.getElementById('appearanceReason').textContent = appearanceText;

  // 填充：表现侧（取第一层 side）
  document.getElementById('exhibitSide').textContent = tpl.exhibitSide(l1);

  // 填充：优先处理侧（Q4 加权 + L1 加权）
  const prioritySideText = getQ4WeightedContent(templateKey, q4, 'prioritySide', l1)
    || tpl.prioritySide(l1);
  document.getElementById('prioritySideValue').textContent = prioritySideText;

  // 填充：训练提示（Q4 加权）
  const trainingText = getQ4WeightedContent(templateKey, q4, 'training', l1);
  document.getElementById('trainingTips').textContent = trainingText;

  // 填充：常见误判（Q4 加权）
  const mistakesText = getQ4WeightedContent(templateKey, q4, 'mistakes', l1);
  document.getElementById('commonMistakes').textContent = mistakesText;
}

// 执行渲染
render();
</script>
