<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>进阶评估结果 v1.2</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f5f7fb; color: #1f2937;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
body { min-height: 100vh; }
.page { width: 100%; max-width: 560px; margin: 0 auto; padding: 16px 16px 28px; display: none; }
.page.active { display: block; }
.card { background: #fff; border-radius: 20px; padding: 20px 16px 18px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06); margin-bottom: 14px; }
.eyebrow { font-size: 12px; color: #6366f1; font-weight: 700; letter-spacing: .04em; margin-bottom: 10px; }
.title { font-size: 22px; line-height: 1.4; margin: 0 0 12px; font-weight: 700; color: #111827; }
.subtitle { font-size: 13px; color: #6b7280; margin-bottom: 12px; line-height: 1.6; }
.section-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.section-title .num { width: 26px; height: 26px; background: #4f46e5; color: #fff; border-radius: 50%; display: grid; place-items: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.conclusion-box { background: #f8fafc; border-radius: 14px; padding: 16px 14px; margin-bottom: 12px; }
.conclusion-box:last-child { margin-bottom: 0; }
.conclusion-label { font-size: 13px; color: #4f46e5; font-weight: 700; margin-bottom: 6px; }
.conclusion-label.secondary { color: #ec4899; }
.conclusion-label.priority { color: #10b981; }
.conclusion-title { font-size: 16px; color: #111827; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
.conclusion-text { font-size: 14px; color: #4b5563; line-height: 1.7; }
.priority-list { padding: 0; margin: 0; list-style: none; counter-reset: prio; }
.priority-list li { counter-increment: prio; padding: 8px 0 8px 32px; position: relative; font-size: 14px; line-height: 1.7; color: #1f2937; border-bottom: 1px solid #e5e7eb; }
.priority-list li:last-child { border-bottom: none; }
.priority-list li::before { content: counter(prio); position: absolute; left: 0; top: 9px; width: 22px; height: 22px; background: #10b981; color: #fff; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; }
.empty-state { color: #9ca3af; font-style: italic; font-size: 14px; padding: 4px 0; }
.complexity-tag { display: inline-block; background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-right: 6px; }
.complexity-tag.side_unclear { background: #e0e7ff; color: #3730a3; }
.complexity-tag.high_complexity { background: #fee2e2; color: #991b1b; }
.complexity-tag.conflicting_evidence { background: #fed7aa; color: #9a3412; }
.complexity-tag.low_evidence { background: #f3f4f6; color: #6b7280; }
.complexity-row { padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
.complexity-row:last-child { border-bottom: none; }
.complexity-row .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
.complexity-row .body { font-size: 14px; color: #1f2937; line-height: 1.6; }
.layer3-btn { display: block; width: 100%; background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; border: none; border-radius: 14px; min-height: 50px; padding: 0 16px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; line-height: 50px; text-decoration: none; }
.layer3-btn.disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
.tip { margin-top: 12px; text-align: center; font-size: 12px; color: #9ca3af; line-height: 1.6; }
.footer-note { font-size: 12px; color: #6b7280; line-height: 1.7; padding: 12px 14px; background: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb; }
.debug-toggle { text-align: center; margin-top: 12px; font-size: 11px; color: #9ca3af; cursor: pointer; user-select: none; }
.debug-pre { background: #1f2937; color: #d1d5db; padding: 10px; border-radius: 8px; font-size: 11px; line-height: 1.5; overflow-x: auto; margin-top: 8px; display: none; }
</style>
</head>
<body>

<section id="result-page" class="page active">

<!-- 加载占位 -->
<div id="loading-card" class="card">
  <div class="eyebrow">进阶评估 v1.2</div>
  <div class="title">正在为你生成结果…</div>
  <div class="subtitle">载入引擎配置，计算 16 题证据。</div>
</div>

<!-- 结果标题 -->
<div id="result-header" class="card" style="display:none">
  <div class="eyebrow">进阶评估 v1.2</div>
  <h2 class="title" id="result-title">你的进阶评估结果</h2>
  <div class="subtitle" id="result-subtitle">前两层评估用于帮你找到主要原因和训练方向。</div>
</div>

<!-- 核心结论区（3 模块） -->
<div id="conclusion-card" class="card" style="display:none">
  <div class="section-title"><span class="num">1</span>主因</div>
  <div class="conclusion-box">
    <div class="conclusion-label">主因</div>
    <div class="conclusion-title" id="conclusion-main-title">—</div>
    <div class="conclusion-text" id="conclusion-main-text">—</div>
  </div>

  <div class="section-title" style="margin-top: 6px;"><span class="num">2</span>次因</div>
  <div class="conclusion-box">
    <div class="conclusion-label secondary">次因</div>
    <div class="conclusion-title" id="conclusion-secondary-title">—</div>
    <div class="conclusion-text" id="conclusion-secondary-text">—</div>
  </div>

  <div class="section-title" style="margin-top: 6px;"><span class="num">3</span>训练重点</div>
  <div class="conclusion-box">
    <div class="conclusion-label priority">训练重点</div>
    <ol class="priority-list" id="conclusion-priority-list"></ol>
  </div>
</div>

<!-- 复杂度提示（仅当存在时显示） -->
<div id="complexity-card" class="card" style="display:none">
  <div class="complexity-row">
    <div class="label">📌 评估说明</div>
    <div class="body" id="complexity-body"></div>
  </div>
</div>

<!-- Layer 3 入口（v0.1.3 已激活） -->
<div id="layer3-card" class="card">
  <a id="layer3-btn" class="layer3-btn" href="third-layer/">第三层 14 天居家跟练</a>
  <div class="tip" style="margin-top:10px">进入第三层，自动基于本次第二层结果生成 14 天个人跟练计划。视频素材将陆续补充。</div>
</div>

<!-- 页脚说明 -->
<div class="footer-note" id="footer-note">
  前两层评估用于帮你找到主要原因和训练方向。完整 14 天跟练计划属于第三层，需付费打开，可根据需要自行选择是否进入。
</div>

<!-- 调试视图（开发用） -->
<div class="debug-toggle" id="debug-toggle">[ 开发者视图：显示引擎输出 ]</div>
<pre id="debug-pre" class="debug-pre"></pre>

</section>

<script src="js/second-layer-config-v1.2.js"></script>
<script src="js/second-layer-engine-v1.2-browser.js"></script>
<script>
const STORAGE_KEY = 'laa_second_layer_payload_v12';

function readPayload() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

// 主因说明：按 T 类型给一段固定描述（统一简体）
const TYPE_DESCRIPTIONS = {
  T1: '你的主要问题集中在微笑时口角启动不对称，一侧嘴角更难擡起，或者一笑脸更容易偏。',
  T2: '你的主要问题在下颌位置不对称，闭嘴或张嘴时下巴容易偏向一侧。',
  T3: '你的主要问题在一侧面中部支撑较弱，一侧法令纹更深或苹果肌更塌。',
  T4: '你的主要问题在下颌缘不清晰，一侧下半脸更松、更显垮。',
  T5: '你的主要问题在头颈位置偏移或肩颈张力不均，一侧整体感觉被牵拉。',
};

function describeType(t) {
  if (!t) return null;
  return TYPE_DESCRIPTIONS[t] || '';
}

function buildPrimaryText(result) {
  const baseDesc = describeType(result.mainType);
  if (baseDesc) return baseDesc;
  if (result.resultSummary) {
    const firstSentence = result.resultSummary.split(/[。！？!?]/)[0];
    if (firstSentence && firstSentence.length > 4) return firstSentence + '。';
  }
  return '—';
}

// 次因说明：聚焦"次因对主因的影响"而不是次因自身
// 模板: "你的[sec_desc]也会影响[main_desc]训练稳定性，所以不能只练[main_location]。"
// 按 (mainType, secondaryType) 配对：20 个组合全覆盖
const SECONDARY_IMPACT = {
  // 主=T1 口角
  'T1|T2': '你的下颌位置也会影响口角训练稳定性，所以不能只练口角。',
  'T1|T3': '你的面中支撑也会影响口角训练稳定性，所以不能只练口角。',
  'T1|T4': '你的下颌缘松垮也会影响口角训练稳定性，所以不能只练口角。',
  'T1|T5': '你的头颈位置也会影响口角训练稳定性，所以不能只练嘴角。',
  // 主=T2 下颌
  'T2|T1': '你的口角不对称也会影响下颌训练稳定性，所以不能只练下颌。',
  'T2|T3': '你的面中支撑也会影响下颌训练稳定性，所以不能只练下颌。',
  'T2|T4': '你的下颌缘松垮也会影响下颌训练稳定性，所以不能只练下颌。',
  'T2|T5': '你的头颈位置也会影响下颌训练稳定性，所以不能只练下颌。',
  // 主=T3 面中
  'T3|T1': '你的口角不对称也会影响面中训练稳定性，所以不能只练苹果肌。',
  'T3|T2': '你的下颌位置也会影响面中训练稳定性，所以不能只练苹果肌。',
  'T3|T4': '你的下颌缘松垮也会影响面中训练稳定性，所以不能只练苹果肌。',
  'T3|T5': '你的头颈位置也会影响面中训练稳定性，所以不能只练苹果肌。',
  // 主=T4 下颌缘
  'T4|T1': '你的口角不对称也会影响下颌缘训练稳定性，所以不能只练下颌线。',
  'T4|T2': '你的下颌位置也会影响下颌缘训练稳定性，所以不能只练下颌线。',
  'T4|T3': '你的面中支撑也会影响下颌缘训练稳定性，所以不能只练下颌线。',
  'T4|T5': '你的头颈位置也会影响下颌缘训练稳定性，所以不能只练下颌线。',
  // 主=T5 头颈
  'T5|T1': '你的口角不对称也会影响头颈训练稳定性，所以不能只练头颈。',
  'T5|T2': '你的下颌位置也会影响头颈训练稳定性，所以不能只练头颈。',
  'T5|T3': '你的面中支撑也会影响头颈训练稳定性，所以不能只练头颈。',
  'T5|T4': '你的下颌缘松垮也会影响头颈训练稳定性，所以不能只练头颈。',
};

function buildSecondaryText(result) {
  if (!result.secondaryType) return null;
  const key = result.mainType + '|' + result.secondaryType;
  if (SECONDARY_IMPACT[key]) return SECONDARY_IMPACT[key];
  // 兜底（mainType 也为 null 等边缘情况）
  const secDesc = describeType(result.secondaryType);
  if (secDesc) {
    return secDesc + ' 它也会影响训练稳定性。';
  }
  return '—';
}

function buildSecondaryTitle(result) {
  if (!result.secondaryType) return '暂未发现明显次因';
  return result.secondaryType + '｜' + result.secondaryTypeName;
}

function buildMainTitle(result) {
  if (!result.mainType) return '未检出明确主类型';
  return result.mainType + '｜' + result.mainTypeName;
}

function complexityText(hint) {
  if (!hint) return null;
  const labels = {
    low_evidence: { tag: '证据不足', text: '目前没有非常明确的证据指向单一类型，建议先做基础中线复测。' },
    mixed_evidence: { tag: '证据混合', text: '你的表现不是单一类型，更像多个结构问题叠加。' },
    conflicting_evidence: { tag: '主诉与证据不一致', text: '你的主观困扰和测试表现存在一定差异，请以结构证据为准并结合自身感受。' },
    high_complexity: { tag: '高复杂度', text: '多结构同时并存，需要按优先级分层训练。' },
    side_unclear: { tag: '左右侧不明', text: '类型可判断，但左右侧需要在训练前复测。' },
  };
  return labels[hint] || { tag: hint, text: '' };
}

function renderResult(result) {
  document.getElementById('loading-card').style.display = 'none';
  document.getElementById('result-header').style.display = 'block';
  document.getElementById('conclusion-card').style.display = 'block';

  // 1. 主因
  document.getElementById('conclusion-main-title').textContent = buildMainTitle(result);
  document.getElementById('conclusion-main-text').textContent = buildPrimaryText(result);

  // 2. 次因
  document.getElementById('conclusion-secondary-title').textContent = buildSecondaryTitle(result);
  const secText = buildSecondaryText(result);
  const secTextEl = document.getElementById('conclusion-secondary-text');
  if (secText) {
    secTextEl.innerHTML = secText;
    secTextEl.style.display = '';
  } else {
    // secondaryType=null：不显示说明
    secTextEl.innerHTML = '';
    secTextEl.style.display = 'none';
  }

  // 3. 训练重点
  const priorityList = document.getElementById('conclusion-priority-list');
  if (result.trainingPriorityText && result.trainingPriorityText.length > 0) {
    priorityList.innerHTML = result.trainingPriorityText.map(t => '<li>' + t + '</li>').join('');
  } else {
    priorityList.innerHTML = '<li class="empty-state">无训练重点建议</li>';
  }

  // 复杂度提示（可选）
  if (result.complexityHint) {
    document.getElementById('complexity-card').style.display = 'block';
    const c = complexityText(result.complexityHint);
    document.getElementById('complexity-body').innerHTML =
      '<span class="complexity-tag ' + result.complexityHint + '">' + c.tag + '</span>' + c.text;
  }

  // 调试视图
  document.getElementById('debug-pre').textContent = JSON.stringify(result, null, 2);
}

function showError(msg) {
  document.getElementById('loading-card').innerHTML = `
    <div class="eyebrow">进阶评估 v1.2</div>
    <div class="title">⚠️ 结果生成失败</div>
    <div class="subtitle">${msg}</div>
    <div style="margin-top:14px"><a href="advanced-questions.html" class="layer3-btn" style="background:#6b7280">返回重新答题</a></div>
  `;
}

// 启动
(async function() {
  if (!window.secondLayerConfigV12) {
    const ok = await window.loadEngineV12();
    if (!ok) {
      showError('无法载入引擎配置（second-layer-config-v1.2.json），请检查网络。');
      return;
    }
  }

  const payload = readPayload();
  if (!payload) {
    window.location.href = 'advanced-questions.html';
    return;
  }

  if (payload.version !== 'second-layer-v1.2') {
    showError('检测到旧版评估数据（version: ' + (payload.version || 'unknown') + '），请回到进阶评估页重新答题。');
    return;
  }

  try {
    const result = window.runSecondLayerV12({
      firstLayerDirection: payload.firstLayerDirection || null,
      truthTendency: payload.truthTendency || null,
      q16Focus: payload.q16Focus || null,
      answers: payload.answers || {},
    });
    renderResult(result);
    localStorage.setItem('laa_second_layer_result_v12', JSON.stringify(result));
  } catch (e) {
    console.error('engine error', e);
    showError('引擎执行失败：' + (e.message || String(e)));
  }
})();

document.getElementById('debug-toggle').addEventListener('click', function() {
  const pre = document.getElementById('debug-pre');
  pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
});
</script>
</body>
</html>
