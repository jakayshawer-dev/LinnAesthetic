<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大小脸免费初筛</title>
    <style>
        /* 内联CSS以避免外部文件加载问题 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: calc(100vh - 40px);
        }

        .page {
            display: none;
            height: 100%;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            padding: 30px 25px;
            height: 100%;
        }

        /* 首页样式 */
        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 60px;
            color: #4a6fa5;
        }

        .main-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #4a6fa5;
        }

        .feature::before {
            content: "✓";
            color: #4a6fa5;
            font-size: 20px;
            font-weight: bold;
            width: 24px;
            text-align: center;
        }

        .feature span {
            font-size: 16px;
            color: #2c3e50;
            font-weight: 500;
        }

        /* 按钮样式 */
        .btn-primary, .btn-secondary {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover, .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #4a6fa5;
            border: 2px solid #e0e6ff;
        }

        .btn-secondary:hover, .btn-secondary:active {
            background: #eef1ff;
            transform: translateY(-2px);
        }

        .disclaimer {
            margin-top: 30px;
            padding: 15px;
            background: #fff8e1;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
        }

        .disclaimer p {
            font-size: 14px;
            color: #856404;
        }

        .disclaimer::before {
            content: "ℹ️ ";
            margin-right: 5px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            body { padding: 15px; }
            .container { padding: 25px 20px; }
            .main-title { font-size: 24px; }
            .btn-primary, .btn-secondary { padding: 16px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="container">
                <div class="logo">👨‍⚕️</div>
                <h1 class="main-title">大小脸免费初筛</h1>
                <p class="subtitle">12题，约1分钟，帮你先看真假倾向和主要方向</p>
                
                <div class="features">
                    <div class="feature">
                        <span>专业评估逻辑</span>
                    </div>
                    <div class="feature">
                        <span>快速完成测试</span>
                    </div>
                    <div class="feature">
                        <span>隐私保护</span>
                    </div>
                </div>
                
                <button id="start-btn" class="btn-primary">
                    开始测试
                </button>
                
                <div class="disclaimer">
                    <p>本测试为免费初筛，结果仅供参考，不等同于正式评估</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的主页脚本
        document.getElementById('start-btn').addEventListener('click', function() {
            alert('完整功能请访问完整版本：\n\n当前为简化演示版，完整版本包含：\n• 12道专业题目\n• 智能评分系统\n• 个性化结果分析\n\n请使用完整版本进行测试。');
            
            // 重定向到完整版本
            window.location.href = 'https://facescreentest.loca.lt';
        });
    </script>
</body>
</html>
