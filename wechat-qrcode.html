<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAA测试 - 微信二维码</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .logo {
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #6c757d;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .qrcode-container {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            display: inline-block;
        }
        
        .qrcode {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }
        
        .url-box {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: #0c5460;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .url-box:hover {
            background: #d1ecf1;
        }
        
        .instructions {
            text-align: left;
            background: #fff8e1;
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
            border-left: 4px solid #ffc107;
        }
        
        .instructions h3 {
            color: #856404;
            margin: 0 0 15px 0;
            font-size: 16px;
        }
        
        .instructions ol {
            padding-left: 20px;
            margin: 0;
            color: #856404;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .warning {
            background: #f8d7da;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #dc3545;
            color: #721c24;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #28a745;
            color: #155724;
            font-size: 14px;
            display: none;
        }
        
        .test-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .test-link {
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-decoration: none;
            color: #4a6fa5;
            font-weight: 500;
            border: 2px solid #e0e6ff;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .test-link:hover {
            background: #eef1ff;
            transform: translateY(-2px);
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
            
            .qrcode {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>LAA 大小脸评估</h1>
            <p>微信测试二维码</p>
        </div>
        
        <div class="qrcode-container">
            <div class="qrcode" id="qrcode">
                <!-- 二维码将在这里显示 -->
                正在生成二维码...
            </div>
        </div>
        
        <div class="url-box" id="urlBox">
            点击复制测试链接
        </div>
        
        <div class="instructions">
            <h3>📱 微信测试步骤：</h3>
            <ol>
                <li>打开微信，点击右上角"+"号</li>
                <li>选择"扫一扫"功能</li>
                <li>对准上方二维码扫描</li>
                <li>点击"访问网页"或"在浏览器打开"</li>
                <li>开始测试评估</li>
            </ol>
        </div>
        
        <div class="warning">
            ⚠️ <strong>公网测试：</strong>此链接为GitHub Pages公网链接，任何人都可以访问！
        </div>
        
        <div class="success" id="successMsg">
            ✅ 链接已复制到剪贴板！
        </div>
        
        <div class="test-links">
            <a href="index.html" class="test-link" id="mainLink">主测试页面</a>
            <a href="preview.html" class="test-link" id="previewLink">效果预览</a>
            <a href="test-modifications.html" class="test-link" id="instructionsLink">使用说明</a>
        </div>
    </div>
    
    <script>
        // 获取当前页面的基础URL
        function getBaseUrl() {
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            // 移除文件名，获取目录路径
            const pathParts = pathname.split('/');
            pathParts.pop(); // 移除当前文件名
            const directoryPath = pathParts.join('/') || '/';
            
            return `${protocol}//${hostname}${directoryPath}`;
        }
        
        // 生成二维码 - 使用纯CSS生成，不依赖外部API
        function generateQRCode() {
            const baseUrl = getBaseUrl();
            const testUrl = `${baseUrl}index.html`;
            
            // 显示URL
            document.getElementById('urlBox').innerHTML = `
                <strong>测试链接：</strong><br>
                ${testUrl}<br>
                <small style="color: #6c757d;">点击复制链接</small>
            `;
            
            const qrcodeElement = document.getElementById('qrcode');
            
            // 创建纯文本二维码（简单但可靠）
            qrcodeElement.innerHTML = `
                <div style="
                    width: 100%;
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    background: white;
                    border-radius: 8px;
                    padding: 15px;
                    text-align: center;
                    border: 2px solid #e0e6ff;
                ">
                    <div style="
                        font-size: 14px;
                        font-weight: bold;
                        color: #2c3e50;
                        margin-bottom: 10px;
                    ">
                        📱 LAA测试链接
                    </div>
                    <div style="
                        font-size: 12px;
                        color: #6c757d;
                        word-break: break-all;
                        margin-bottom: 15px;
                        line-height: 1.4;
                    ">
                        ${testUrl}
                    </div>
                    <div style="
                        font-size: 11px;
                        color: #856404;
                        background: #fff8e1;
                        padding: 8px 12px;
                        border-radius: 6px;
                        border: 1px solid #ffeaa7;
                    ">
                        ⚠️ 如无法扫描，请手动复制链接
                    </div>
                </div>
            `;
            
            // 同时创建一个隐藏的img标签，使用更可靠的二维码服务
            const fallbackQrcodeUrl = `https://quickchart.io/qr?text=${encodeURIComponent(testUrl)}&size=200&margin=1&dark=2c3e50&light=ffffff`;
            const fallbackImg = document.createElement('img');
            fallbackImg.src = fallbackQrcodeUrl;
            fallbackImg.alt = "LAA测试二维码";
            fallbackImg.style.display = 'none';
            fallbackImg.onload = function() {
                // 如果图片加载成功，替换为真正的二维码
                qrcodeElement.innerHTML = `<img src="${fallbackQrcodeUrl}" alt="LAA测试二维码" style="width:100%;height:100%;border-radius:8px;">`;
                console.log('✅ 二维码图片加载成功');
            };
            fallbackImg.onerror = function() {
                console.log('⚠️ 二维码图片加载失败，使用文本显示');
                // 保持文本显示
            };
            qrcodeElement.appendChild(fallbackImg);
            
            // 更新所有链接
            document.getElementById('mainLink').href = testUrl;
            document.getElementById('previewLink').href = `${baseUrl}preview.html`;
            document.getElementById('instructionsLink').href = `${baseUrl}test-modifications.html`;
            
            console.log('✅ 二维码生成完成！');
            console.log(`📱 测试链接: ${testUrl}`);
        }
        
        // 复制链接到剪贴板
        document.getElementById('urlBox').addEventListener('click', function() {
            const baseUrl = getBaseUrl();
            const testUrl = `${baseUrl}index.html`;
            
            navigator.clipboard.writeText(testUrl).then(() => {
                const successMsg = document.getElementById('successMsg');
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 2000);
                
                console.log('✅ 链接已复制到剪贴板');
            }).catch(err => {
                console.error('❌ 复制失败:', err);
                alert('复制失败，请手动复制链接');
            });
        });
        
        // 页面加载完成后生成二维码
        document.addEventListener('DOMContentLoaded', generateQRCode);
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'c') {
                const baseUrl = getBaseUrl();
                const testUrl = `${baseUrl}index.html`;
                navigator.clipboard.writeText(testUrl);
                console.log('✅ 链接已复制（Ctrl+C）');
            }
        });
    </script>
</body>
</html>
