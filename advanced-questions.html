<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>LAA 进阶评估</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 min-height: 100vh;
 padding: 20px;
 }
 .container { max-width: 600px; margin: 0 auto; }
 .header { text-align: center; color: white; margin-bottom: 30px; }
 .header h1 { font-size: 24px; margin-bottom: 10px; }
 .progress-bar {
 background: rgba(255,255,255,0.2);
 height: 8px; border-radius: 4px;
 margin-bottom: 30px; overflow: hidden;
 }
 .progress-fill { background: white; height: 100%; width: 25%; border-radius: 4px; transition: width 0.3s ease; }
 .question-card {
 background: white; border-radius: 16px;
 padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
 }
 .question-number { color: #667eea; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
 .question-title { font-size: 20px; color: #333; margin-bottom: 15px; line-height: 1.5; }
 .question-subtitle { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
 .options { display: flex; flex-direction: column; gap: 12px; }
 .option {
 display: flex; align-items: center;
 padding: 16px 20px; border: 2px solid #e0e0e0;
 border-radius: 12px; cursor: pointer;
 transition: all 0.2s ease; background: white;
 }
 .option:hover { border-color: #667eea; background: #f8f9ff; }
 .option.selected { border-color: #667eea; background: #f0f2ff; }
 .option-indicator {
 width: 28px; height: 28px; border: 2px solid #ddd;
 border-radius: 50%; display: flex; align-items: center; justify-content: center;
 margin-right: 15px; font-weight: 600; color: #666; font-size: 14px; flex-shrink: 0;
 }
 .option.selected .option-indicator { background: #667eea; border-color: #667eea; color: white; }
 .option-text { flex: 1; font-size: 15px; color: #333; line-height: 1.5; }
 .option.selected .option-text { color: #667eea; font-weight: 500; }
 .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
 .btn {
 padding: 14px 30px; border: none; border-radius: 10px;
 font-size: 15px; cursor: pointer; transition: all 0.2s ease; font-weight: 500;
 }
 .btn-secondary { background: #f0f0f0; color: #666; }
 .btn-secondary:hover { background: #e0e0e0; }
 .btn-primary {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: white;
 }
 .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
 .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 .hidden { display: none !important; }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>LAA · 进阶评估</h1>
 <p>补充4个问题，让评估更准确</p>
 </div>
 <div class="progress-bar">
 <div class="progress-fill" id="progress-fill"></div>
 </div>
 <div class="question-card">
 <div class="question-number" id="question-number">问题 1/4</div>
 <h2 class="question-title" id="question-title">加载中...</h2>
 <p class="question-subtitle" id="question-subtitle"></p>
 <div class="options" id="options-container"></div>
 <div class="nav-buttons">
 <button class="btn btn-secondary" id="prev-btn" style="visibility: hidden;">上一题</button>
 <button class="btn btn-primary" id="next-btn" disabled>下一题</button>
 </div>
 </div>
 </div>
 <script>
 const advancedQuestions = [
 {
 id: 'Q1',
 title: '你最明显感觉左右不对称，是在什么情况下更容易看到？',
 subtitle: '选择最符合你日常观察的情况',
 options: [
 { text: 'A. 静态拍照时更明显', value: 'A' },
 { text: 'B. 微笑或说话时更明显', value: 'B' },
 { text: 'C. 咀嚼或用力时更明显', value: 'C' },
 { text: 'D. 每天看起来不太一样，不太稳定', value: 'D' }
 ]
 },
 {
 id: 'Q2',
 title: '你平时最明显、持续时间最长的一种偏侧使用习惯是？',
 subtitle: '选择你最明显、最长期的习惯',
 options: [
 { text: 'A. 单侧咀嚼（吃东西总用一边）', value: 'A' },
 { text: 'B. 固定侧睡（总睡同一侧）', value: 'B' },
 { text: 'C. 托腮或歪头（总用同一只手托腮或头歪向一边）', value: 'C' },
 { text: 'D. 没有明显偏侧习惯', value: 'D' }
 ]
 },
 {
 id: 'Q3',
 title: '你觉得哪一侧的「控制感」更差？',
 subtitle: '比如微笑时启动慢、鼓气容易漏、闭眼不够全等',
 options: [
 { text: 'A. 左侧控制更差', value: 'A' },
 { text: 'B. 右侧控制更差', value: 'B' },
 { text: 'C. 两侧差不多，没有明显控制差异', value: 'C' },
 { text: 'D. 不确定或没注意过', value: 'D' }
 ]
 },
 {
 id: 'Q4',
 title: '你是否有以下情况？',
 subtitle: '可多选（最多2项）',
 options: [
 { text: 'A. 咬合不顺或下巴轨迹偏斜', value: 'A' },
 { text: 'B. 颈部一侧总更紧或活动受限', value: 'B' },
 { text: 'C. 肩膀一高一低或头总歪向一边', value: 'C' },
 { text: 'D. 以上都没有', value: 'D' }
 ]
 }
 ];

 // 应用状态
 let currentQuestionIndex = 0;
 let userAnswers = new Array(advancedQuestions.length).fill(null);
 
 // DOM元素
 const questionNumberEl = document.getElementById('question-number');
 const questionTitleEl = document.getElementById('question-title');
 const questionSubtitleEl = document.getElementById('question-subtitle');
 const optionsContainer = document.getElementById('options-container');
 const prevBtn = document.getElementById('prev-btn');
 const nextBtn = document.getElementById('next-btn');
 const progressFill = document.getElementById('progress-fill');
 
 // 🚨 关键修复：防止页面点击跳转
 document.addEventListener('click', function(e) {
 // 如果点击的不是选项、按钮或链接，阻止默认行为
 const isOption = e.target.closest('.option');
 const isButton = e.target.closest('button');
 const isLink = e.target.closest('a');
 
 if (!isOption && !isButton && !isLink) {
 console.log('阻止页面点击跳转');
 e.preventDefault();
 e.stopPropagation();
 }
 }, true); // 使用捕获阶段
 
 // 🚨 关键修复：防止触摸事件导致跳转
 document.addEventListener('touchstart', function(e) {
 const isOption = e.target.closest('.option');
 const isButton = e.target.closest('button');
 const isLink = e.target.closest('a');
 
 if (!isOption && !isButton && !isLink) {
 console.log('阻止触摸事件跳转');
 e.preventDefault();
 e.stopPropagation();
 }
 }, { passive: false, capture: true });
 
 // 初始化
 function init() {
 console.log('第二层测试初始化');
 showQuestion(0);
 }
 
 // 显示题目
 function showQuestion(index) {
 if (index < 0 || index >= advancedQuestions.length) return;
 
 currentQuestionIndex = index;
 const question = advancedQuestions[index];
 
 // 更新进度
 const progressPercent = ((index + 1) / advancedQuestions.length) * 100;
 progressFill.style.width = `${progressPercent}%`;
 questionNumberEl.textContent = `问题 ${index + 1}/4`;
 questionTitleEl.textContent = question.title;
 questionSubtitleEl.textContent = question.subtitle || '';
 
 // 清空选项
 optionsContainer.innerHTML = '';
 
 // 创建选项
 question.options.forEach((option, optionIndex) => {
 const optionEl = document.createElement('div');
 optionEl.className = 'option';
 if (userAnswers[index] === option.value) {
 optionEl.classList.add('selected');
 }
 
 optionEl.innerHTML = `
 <div class="option-indicator">${String.fromCharCode(65 + optionIndex)}</div>
 <div class="option-text">${option.text}</div>
 `;
 
 // 🚨 关键修复：添加点击事件，阻止事件冒泡
 optionEl.addEventListener('click', function(e) {
 e.stopPropagation(); // 阻止事件冒泡
 selectOption(index, option.value, optionEl);
 });
 
 optionsContainer.appendChild(optionEl);
 });
 
 // 更新按钮状态
 updateButtonStates();
 }
 
 // 选择选项
 function selectOption(questionIndex, value, optionElement) {
 console.log(`选择第 ${questionIndex + 1} 题选项: ${value}`);
 
 userAnswers[questionIndex] = value;
 
 // 更新UI - 移除其他选项的选中状态
 const allOptions = optionsContainer.querySelectorAll('.option');
 allOptions.forEach(opt => {
 opt.classList.remove('selected');
 });
 
 // 高亮选中的选项
 optionElement.classList.add('selected');
 
 // 启用下一题按钮
 updateButtonStates();
 }
 
 // 更新按钮状态
 function updateButtonStates() {
 // 上一题按钮
 prevBtn.style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
 
 // 下一题按钮
 const hasAnswer = userAnswers[currentQuestionIndex] !== null;
 const isLastQuestion = currentQuestionIndex === advancedQuestions.length - 1;
 
 if (isLastQuestion) {
 nextBtn.textContent = hasAnswer ? '完成评估' : '请先选择答案';
 nextBtn.disabled = !hasAnswer;
 } else {
 nextBtn.textContent = '下一题';
 nextBtn.disabled = !hasAnswer;
 }
 }
 
 // 上一题
 prevBtn.addEventListener('click', function() {
 if (currentQuestionIndex > 0) {
 showQuestion(currentQuestionIndex - 1);
 }
 });
 
 // 下一题/完成
 nextBtn.addEventListener('click', function() {
 if (!userAnswers[currentQuestionIndex]) {
 alert('请先选择一个答案');
 return;
 }
 
 if (currentQuestionIndex < advancedQuestions.length - 1) {
 showQuestion(currentQuestionIndex + 1);
 } else {
 completeAssessment();
 }
 });
 
 // 完成评估
 function completeAssessment() {
 console.log('完成第二层评估，答案:', userAnswers);
 
 // 保存答案到localStorage
 try {
 localStorage.setItem('laa_advanced_answers', JSON.stringify(userAnswers));
 console.log('第二层答案已保存');
 
 // 跳转到解锁页面
 window.location.href = 'advanced-unlock.html';
 } catch (error) {
 console.error('保存答案失败:', error);
 alert('保存失败，请重试');
 }
 }
 
 // 键盘支持
 document.addEventListener('keydown', function(e) {
 if (e.key === 'ArrowLeft' && currentQuestionIndex > 0) {
 showQuestion(currentQuestionIndex - 1);
 } else if (e.key === 'ArrowRight' || e.key === 'Enter') {
 if (nextBtn.disabled) {
 alert('请先选择一个答案');
 } else {
 nextBtn.click();
 }
 } else if (e.key >= '1' && e.key <= '4') {
 const optionIndex = parseInt(e.key) - 1;
 const options = optionsContainer.querySelectorAll('.option');
 if (optionIndex < options.length) {
 options[optionIndex].click();
 }
 }
 });
 
 // 页面加载完成后初始化
 document.addEventListener('DOMContentLoaded', init);
 
 // 调试功能
 window.debugAdvanced = function() {
 console.log('第二层状态:');
 console.log('当前问题:', currentQuestionIndex + 1);
 console.log('答案:', userAnswers);
 };
 </script>
</body>
</html>
