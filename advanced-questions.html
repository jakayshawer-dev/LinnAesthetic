<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAA 进阶评估 - 补充问题</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 第二层补充问题页 -->
        <div id="advanced-questions-page" class="page active">
            <div class="container">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="advanced-progress-fill"></div>
                    </div>
                    <div class="progress-text" id="advanced-progress-text">1/4</div>
                </div>
                
                <div class="system-identifier">
                    LAA · 进阶评估
                </div>
                
                <div class="question-container">
                    <h2 class="question-title" id="advanced-question-title"></h2>
                    <div class="question-hint" id="advanced-question-hint"></div>
                    
                    <div class="options-container" id="advanced-options-container">
                        <!-- 选项会动态生成 -->
                    </div>
                </div>
                
                <div class="navigation-buttons">
                    <button id="advanced-prev-btn" class="btn-secondary">
                        <i class="fas fa-arrow-left"></i> 上一题
                    </button>
                    <button id="advanced-next-btn" class="btn-primary">
                        下一题 <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                
                <div class="system-identifier-bottom">
                    LAA · 进阶评估
                </div>
            </div>
        </div>
    </div>

    <!-- 加载必要的JS文件 -->
    <script src="js/data-manager.js"></script>
    <script src="js/answer-hash-generator.js"></script>
    <script src="js/test-id.js"></script>
    <script src="js/second-layer-testid.js"></script>
    
    <script>
        // 第二层进阶问题数据
        const advancedQuestions = [
            {
                id: 1,
                title: "你觉得你的大小脸问题在什么时候更明显？",
                hint: "选择最符合你情况的描述",
                options: [
                    "微笑或说话时更明显",
                    "某一侧表情或发力更常用",
                    "静态还好，但一动起来就更明显",
                    "为什么两边位置/高低/线条方向不一样"
                ]
            },
            {
                id: 2,
                title: "你更关注哪一侧的问题？",
                hint: "选择你更在意或更明显的一侧",
                options: [
                    "左侧更明显",
                    "右侧更明显", 
                    "两边都明显，但表现不同",
                    "不确定，感觉整体不对称"
                ]
            },
            {
                id: 3,
                title: "这个问题对你的影响程度？",
                hint: "选择对你生活的影响程度",
                options: [
                    "只是外观上注意到，不影响生活",
                    "拍照时会注意，会刻意调整角度",
                    "社交时会不自信，会刻意掩饰",
                    "已经影响到心理状态，想寻求改善"
                ]
            },
            {
                id: 4,
                title: "你希望通过评估获得什么？",
                hint: "选择你最希望获得的结果",
                options: [
                    "了解问题的性质和原因",
                    "知道改善的方向和方法",
                    "获得专业的评估和建议",
                    "找到适合的解决方案"
                ]
            }
        ];

        // 当前状态
        let currentAdvancedQuestionIndex = 0;
        let advancedUserAnswers = new Array(advancedQuestions.length).fill(null);

        // 初始化应用
        function initAdvancedApp() {
            showAdvancedQuestion(0);
            updateAdvancedProgress();
            updateAdvancedButtonStates();
        }

        // 显示指定问题
        function showAdvancedQuestion(index) {
            currentAdvancedQuestionIndex = index;
            const question = advancedQuestions[index];
            
            document.getElementById('advanced-question-title').textContent = question.title;
            document.getElementById('advanced-question-hint').textContent = question.hint;
            
            const optionsContainer = document.getElementById('advanced-options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, optionIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                if (advancedUserAnswers[index] === optionIndex) {
                    optionElement.classList.add('selected');
                }
                
                optionElement.innerHTML = `
                    <div class="option-content">
                        <div class="option-text">${option}</div>
                    </div>
                `;
                
                optionElement.addEventListener('click', () => {
                    selectAdvancedOption(index, optionIndex);
                });
                
                optionsContainer.appendChild(optionElement);
            });
            
            updateAdvancedProgress();
            updateAdvancedButtonStates();
        }

        // 选择选项
        function selectAdvancedOption(questionIndex, optionIndex) {
            advancedUserAnswers[questionIndex] = optionIndex;
            
            // 更新UI
            const options = document.querySelectorAll('#advanced-options-container .option');
            options.forEach((option, idx) => {
                if (idx === optionIndex) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
            
            updateAdvancedButtonStates();
        }

        // 显示上一题
        function showPreviousAdvancedQuestion() {
            if (currentAdvancedQuestionIndex > 0) {
                showAdvancedQuestion(currentAdvancedQuestionIndex - 1);
            }
        }

        // 显示下一题
        function showNextAdvancedQuestion() {
            if (currentAdvancedQuestionIndex < advancedQuestions.length - 1) {
                currentAdvancedQuestionIndex++;
                showAdvancedQuestion(currentAdvancedQuestionIndex);
            } else {
                // 🎯 最后一题：生成第二层testId
                if (advancedUserAnswers.every(answer => answer !== null)) {
                    try {
                        // 收集所有进阶答案
                        const advancedAnswers = {};
                        advancedUserAnswers.forEach((answerIndex, index) => {
                            advancedAnswers['AQ' + (index + 1)] = advancedQuestions[index].options[answerIndex];
                        });
                        
                        // 获取基础答案（从第一层）
                        let basicAnswers = {};
                        try {
                            const basicData = localStorage.getItem('laa_basic_answers');
                            if (basicData) {
                                basicAnswers = JSON.parse(basicData);
                            }
                        } catch (e) {
                            console.warn('无法获取基础答案:', e);
                        }
                        
                        // 生成第二层testId
                        if (window.generateSecondLayerTestId) {
                            const testId = window.generateSecondLayerTestId(basicAnswers, advancedAnswers);
                            
                            // 保存到localStorage
                            localStorage.setItem('current_second_layer_test_id', testId);
                            localStorage.setItem('current_test_id', testId);
                            
                            console.log('✅ 第二层testId已生成:', testId);
                            console.log('基础答案数量:', Object.keys(basicAnswers).length);
                            console.log('进阶答案数量:', Object.keys(advancedAnswers).length);
                            
                            // 显示提示
                            alert('🎯 第二层评估完成！\n\n您的测试编号：' + testId + '\n\n请继续上传照片完成评估。');
                            
                            // 跳转到照片上传页
                            window.location.href = 'advanced-photo.html?testId=' + encodeURIComponent(testId);
                            
                        } else {
                            console.warn('generateSecondLayerTestId函数未加载');
                            alert('系统错误：无法生成测试编号，请刷新页面重试。');
                        }
                    } catch (error) {
                        console.error('生成第二层testId失败:', error);
                        alert('生成测试编号失败：' + error.message);
                    }
                } else {
                    alert('请先完成所有问题');
                }
            }
        }

        // 更新进度
        function updateAdvancedProgress() {
            const answeredCount = advancedUserAnswers.filter(answer => answer !== null).length;
            const progress = (answeredCount / advancedQuestions.length) * 100;
            
            const advancedProgressFill = document.getElementById('advanced-progress-fill');
            const advancedProgressText = document.getElementById('advanced-progress-text');
            
            advancedProgressFill.style.width = `${progress}%`;
            advancedProgressText.textContent = `${currentAdvancedQuestionIndex + 1}/${advancedQuestions.length}`;
        }

        // 更新按钮状态
        function updateAdvancedButtonStates() {
            // 上一题按钮
            const advancedPrevBtn = document.getElementById('advanced-prev-btn');
            advancedPrevBtn.disabled = currentAdvancedQuestionIndex === 0;
            
            // 下一题按钮
            const advancedNextBtn = document.getElementById('advanced-next-btn');
            const hasAnswer = advancedUserAnswers[currentAdvancedQuestionIndex] !== null;
            const isLastQuestion = currentAdvancedQuestionIndex === advancedQuestions.length - 1;
            
            if (isLastQuestion) {
                advancedNextBtn.innerHTML = '完成并继续 <i class="fas fa-arrow-right"></i>';
                advancedNextBtn.disabled = !hasAnswer;
            } else {
                advancedNextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
                advancedNextBtn.disabled = !hasAnswer;
            }
        }

        // 添加键盘支持
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                    if (!document.getElementById('advanced-prev-btn').disabled) showPreviousAdvancedQuestion();
                    break;
                case 'ArrowRight':
                case 'Enter':
                    if (!document.getElementById('advanced-next-btn').disabled) showNextAdvancedQuestion();
                    break;
                case '1':
                case '2':
                case '3':
                case '4':
                case '5':
                    const optionIndex = parseInt(e.key) - 1;
                    if (optionIndex < advancedQuestions[currentAdvancedQuestionIndex].options.length) {
                        selectAdvancedOption(currentAdvancedQuestionIndex, optionIndex);
                    }
                    break;
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initAdvancedApp);
    </script>
</body>
</html>
