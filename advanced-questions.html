<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进阶评估</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #f5f7fb;
}

.container {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
}

.question {
    font-size: 20px;
    margin-bottom: 16px;
}

.option {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
}

.option.selected {
    border-color: #4f46e5;
    background: #eef2ff;
}

.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #4f46e5;
    color: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div id="progress">1 / 4</div>

<div id="question" class="question"></div>

<div id="options"></div>

<button id="nextBtn" class="btn">下一题</button>

</div>
</div>

<script>

const questions = [
{
q: "你最明显感觉左右不对称，是在什么情况下更容易看到？",
options: [
"静态拍照更明显",
"动态（说话/笑）更明显",
"一直都明显",
"不太稳定"
]
},
{
q: "你更偏向哪种感觉？",
options: [
"一边更大更鼓",
"一边被拉偏",
"两种都有",
"说不清"
]
},
{
q: "你是否长期单侧使用（咀嚼/托腮/侧睡）？",
options: [
"明显有",
"偶尔有",
"没有",
"不确定"
]
},
{
q: "你觉得问题对你的影响程度？",
options: [
"影响很大",
"中等影响",
"轻微影响",
"几乎没有"
]
}
];

let current = 0;
let answers = [];

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const progress = document.getElementById("progress");

function render() {
    const data = questions[current];
    qEl.innerText = data.q;
    progress.innerText = `${current+1} / 4`;

    optEl.innerHTML = "";

    data.options.forEach((text, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = text;

        if (answers[current] === i) {
            div.classList.add("selected");
        }

        div.onclick = (e) => {
            e.stopPropagation();
            answers[current] = i;
            render();
        };

        optEl.appendChild(div);
    });
}

nextBtn.onclick = () => {
    if (answers[current] === undefined) {
        alert("请先选择");
        return;
    }

    if (current < 3) {
        current++;
        render();
    } else {
        alert("完成第二层（这里后面接收费逻辑）");
    }
};

render();

</script>

</body>
</html>
