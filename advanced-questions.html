<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>LAA 进阶评估</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 min-height: 100vh;
 padding: 20px;
 }
 .container { max-width: 600px; margin: 0 auto; }
 .header { text-align: center; color: white; margin-bottom: 30px; }
 .header h1 { font-size: 24px; margin-bottom: 10px; }
 .progress-bar {
 background: rgba(255,255,255,0.2);
 height: 8px; border-radius: 4px;
 margin-bottom: 30px; overflow: hidden;
 }
 .progress-fill { background: white; height: 100%; width: 25%; border-radius: 4px; transition: width 0.3s ease; }
 .question-card {
 background: white; border-radius: 16px;
 padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
 }
 .question-number { color: #667eea; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
 .question-title { font-size: 20px; color: #333; margin-bottom: 15px; line-height: 1.5; }
 .question-subtitle { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
 .options { display: flex; flex-direction: column; gap: 12px; }
 .option {
 display: flex; align-items: center;
 padding: 16px 20px; border: 2px solid #e0e0e0;
 border-radius: 12px; cursor: pointer;
 transition: all 0.2s ease; background: white;
 }
 .option:hover { border-color: #667eea; background: #f8f9ff; }
 .option.selected { border-color: #667eea; background: #f0f2ff; }
 .option-indicator {
 width: 28px; height: 28px; border: 2px solid #ddd;
 border-radius: 50%; display: flex; align-items: center; justify-content: center;
 margin-right: 15px; font-weight: 600; color: #666; font-size: 14px; flex-shrink: 0;
 }
 .option.selected .option-indicator { background: #667eea; border-color: #667eea; color: white; }
 .option-text { flex: 1; font-size: 15px; color: #333; line-height: 1.5; }
 .option.selected .option-text { color: #667eea; font-weight: 500; }
 .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
 .btn {
 padding: 14px 30px; border: none; border-radius: 10px;
 font-size: 15px; cursor: pointer; transition: all 0.2s ease; font-weight: 500;
 }
 .btn-secondary { background: #f0f0f0; color: #666; }
 .btn-secondary:hover { background: #e0e0e0; }
 .btn-primary {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: white;
 }
 .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
 .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 .hidden { display: none !important; }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>LAA · 进阶评估</h1>
 <p>补充4个问题，让评估更准确</p>
 </div>
 <div class="progress-bar">
 <div class="progress-fill" id="progress-fill"></div>
 </div>
 <div class="question-card">
 <div class="question-number" id="question-number">问题 1/4</div>
 <h2 class="question-title" id="question-title">加载中...</h2>
 <p class="question-subtitle" id="question-subtitle"></p>
 <div class="options" id="options-container"></div>
 <div class="nav-buttons">
 <button class="btn btn-secondary" id="prev-btn" style="visibility: hidden;">上一题</button>
 <button class="btn btn-primary" id="next-btn" disabled>下一题</button>
 </div>
 </div>
 </div>
 <script>
 const advancedQuestions = [
 {
 id: 'Q1',
 title: '你最明显感觉左右不对称，是在什么情况下更容易看到？',
 subtitle: '选择最符合你日常观察的情况',
 options: [
 { text: 'A. 静态拍照时更明显', value: 'A' },
 { text: 'B. 微笑或说话时更明显', value: 'B' },
 { text: 'C. 咀嚼或用力时更明显', value: 'C' },
 { text: 'D. 每天看起来不太一样，不太稳定', value: 'D' }
 ]
 },
 {
 id: 'Q2',
 title: '你平时最明显、持续时间最长的一种偏侧使用习惯是？',
 subtitle: '选择你最明显、最长期的习惯',
 options: [
 { text: 'A. 单侧咀嚼比较明显', value: 'A' },
 { text: 'B. 单侧托脸、侧睡或偏向一侧支撑比较明显', value: 'B' },
 { text: 'C. 某一侧表情或发力更常用', value: 'C' },
 { text: 'D. 没有明显感觉，或不确定', value: 'D' }
 ]
 },
 {
 id: 'Q3',
 title: '你的不对称感受，更接近下面哪一种？',
 subtitle: '描述你感受到的稳定性特征',
 options: [
 { text: 'A. 长期都比较稳定，位置和感觉差不多', value: 'A' },
 { text: 'B. 最近越来越明显', value: 'B' },
 { text: 'C. 有时觉得左边明显，有时又觉得右边明显', value: 'C' },
 { text: 'D. 静态还好，但一动起来就更明显', value: 'D' }
 ]
 },
 {
 id: 'Q4',
 title: '你现在最想优先弄清楚的是哪一类问题？',
 subtitle: '这会影响结果页的解释顺序',
 options: [
 { text: 'A. 为什么一边脸看起来更大', value: 'A' },
 { text: 'B. 为什么笑起来或说话时更不对称', value: 'B' },
 { text: 'C. 为什么我总分不清到底是哪边有问题', value: 'C' },
 { text: 'D. 我更想先知道问题主次和处理顺序', value: 'D' },
 { text: 'E. 以上都有，但我更想先理清整体逻辑', value: 'E' }
 ]
 }
 ];
 
 let currentQuestionIndex = 0;
 let answers = new Array(4).fill(null);
 
 const questionNumber = document.getElementById('question-number');
 const questionTitle = document.getElementById('question-title');
 const questionSubtitle = document.getElementById('question-subtitle');
 const optionsContainer = document.getElementById('options-container');
 const prevBtn = document.getElementById('prev-btn');
 const nextBtn = document.getElementById('next-btn');
 const progressFill = document.getElementById('progress-fill');
 
 function init() {
 showQuestion(0);
 prevBtn.addEventListener('click', () => showQuestion(currentQuestionIndex - 1));
 nextBtn.addEventListener('click', () => {
 if (currentQuestionIndex < 3) {
 showQuestion(currentQuestionIndex + 1);
 } else {
 finishQuestions();
 }
 });
 }
 
 function showQuestion(index) {
 if (index < 0 || index >= 4) return;
 currentQuestionIndex = index;
 const question = advancedQuestions[index];
 
 progressFill.style.width = ((index + 1) / 4 * 100) + '%';
 questionNumber.textContent = `问题 ${index + 1}/4`;
 questionTitle.textContent = question.title;
 questionSubtitle.textContent = question.subtitle;
 
 optionsContainer.innerHTML = '';
 question.options.forEach((option, optionIndex) => {
 const el = document.createElement('div');
 el.className = 'option' + (answers[index] === optionIndex ? ' selected' : '');
 el.innerHTML = `
 <div class="option-indicator">${String.fromCharCode(65 + optionIndex)}</div>
 <div class="option-text">${option.text}</div>
 `;
 // 关键：阻止事件冒泡，确保只有点击选项时才触发
 el.addEventListener('click', (e) => {
 e.stopPropagation();
 selectOption(index, optionIndex);
 });
 optionsContainer.appendChild(el);
 });
 
 updateButtons();
 }
 
 function selectOption(questionIndex, optionIndex) {
 answers[questionIndex] = optionIndex;
 const options = optionsContainer.querySelectorAll('.option');
 options.forEach((opt, idx) => {
 opt.classList.toggle('selected', idx === optionIndex);
 });
 updateButtons();
 // 自动下一题（如果不是最后一题）
 if (questionIndex < 3) {
 setTimeout(() => showQuestion(questionIndex + 1), 200);
 }
 }
 
 function updateButtons() {
 prevBtn.style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
 nextBtn.disabled = answers[currentQuestionIndex] === null;
 nextBtn.textContent = currentQuestionIndex === 3 ? '继续' : '下一题';
 }
 
 function finishQuestions() {
 const testId = localStorage.getItem('current_second_layer_test_id') || generateTestId();
 const answerData = {
 testId: testId,
 answers: answers.map((idx, i) => ({
 questionId: advancedQuestions[i].id,
 selectedOption: advancedQuestions[i].options[idx]?.value || null
 })),
 timestamp: new Date().toISOString()
 };
 localStorage.setItem('laa_advanced_answers_' + testId, JSON.stringify(answerData));
 localStorage.setItem('laa_second_layer_completed_' + testId, 'true');
 window.location.href = 'photo-upload.html?testId=' + encodeURIComponent(testId);
 }
 
 function generateTestId() {
 let lastId = localStorage.getItem('last_test_id') || '24000';
 const newIdNum = parseInt(lastId) + 1;
 const newId = 'LAA' + newIdNum;
 localStorage.setItem('last_test_id', newIdNum.toString());
 localStorage.setItem('current_second_layer_test_id', newId);
 return newId;
 }
 
 document.addEventListener('DOMContentLoaded', init);
 </script>
</body>
</html>
