<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAA 面部不对称评估</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 现有样式保持不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .header p { font-size: 1.2rem; opacity: 0.9; }
        .content { padding: 40px 30px; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-block; text-decoration: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
        .test-id-display { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 20px; border-radius: 12px; margin: 20px 0; text-align: center; }
        .test-id-number { font-size: 2.5rem; font-weight: 800; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LAA 面部评估</h1>
            <p>完成12题评估，获取专属测试编号</p>
        </div>
        
        <div class="content">
            <div id="question-container">
                <!-- 问卷内容会动态加载 -->
                <div class="test-id-display" style="display: none;" id="test-id-result">
                    <h3>🎉 评估完成！</h3>
                    <p>您的专属测试编号：</p>
                    <div class="test-id-number" id="test-id-number">LAA24001</div>
                    <p>请保存此编号，3秒后自动跳转到支付页面...</p>
                </div>
                
                <div id="question-content">
                    <h2>欢迎使用LAA面部不对称评估</h2>
                    <p>本评估包含12个问题，帮助您了解面部结构特征。</p>
                    <p>完成评估后，系统将生成专属测试编号，并引导您完成支付流程。</p>
                    
                    <button class="btn-primary" id="start-btn" style="margin-top: 30px;">
                        <i class="fas fa-play"></i> 开始评估
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/test-id.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('start-btn');
            const questionContent = document.getElementById('question-content');
            const testIdResult = document.getElementById('test-id-result');
            const testIdNumber = document.getElementById('test-id-number');
            
            // 模拟问卷完成
            startBtn.addEventListener('click', function() {
                // 生成测试编号
                const testId = window.generateTestId ? window.generateTestId() : 'LAA' + (24000 + Math.floor(Math.random() * 1000));
                
                // 显示测试编号
                testIdNumber.textContent = testId;
                questionContent.style.display = 'none';
                testIdResult.style.display = 'block';
                
                // 保存到localStorage
                localStorage.setItem('current_test_id', testId);
                
                // 3秒后跳转到支付页面
                setTimeout(function() {
                    window.location.href = 'payment-page.html?testId=' + encodeURIComponent(testId);
                }, 3000);
            });
            
            // 如果有URL参数，直接显示测试编号
            const urlParams = new URLSearchParams(window.location.search);
            const testIdParam = urlParams.get('testId');
            if (testIdParam) {
                testIdNumber.textContent = testIdParam;
                questionContent.style.display = 'none';
                testIdResult.style.display = 'block';
            }
        });
    </script>
</body>
</html>
