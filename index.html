<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAA 面部不对称评估</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 问卷样式 */
        .question-container {
            padding: 20px;
        }
        
        .question-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        
        .option-btn {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .option-btn:hover {
            border-color: #4f46e5;
            background: #f8fafc;
        }
        
        .option-btn.selected {
            border-color: #4f46e5;
            background: #4f46e5;
            color: white;
        }
        
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #64748b;
        }
        
        .progress-container {
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #4f46e5;
            width: 0%;
            transition: width 0.3s;
        }
        
        .test-id-result {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        
        .test-id-number {
            font-size: 3rem;
            font-weight: 800;
            color: #4f46e5;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LAA 面部评估</h1>
            <p>完成12题评估，获取专属测试编号</p>
        </div>
        
        <div class="content">
            <!-- 问卷容器 -->
            <div id="question-page">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text" id="progress-text">1/12</div>
                </div>
                
                <div class="question-container">
                    <h2 class="question-title" id="question-title">问题1：正面观察时，面部左右对称度如何？</h2>
                    
                    <div class="options-container" id="options-container">
                        <button class="option-btn" data-value="A">A. 基本对称，无明显差异</button>
                        <button class="option-btn" data-value="B">B. 轻微不对称，仔细观察可见</button>
                        <button class="option-btn" data-value="C">C. 明显不对称，一眼可见差异</button>
                        <button class="option-btn" data-value="D">D. 严重不对称，影响外观</button>
                    </div>
                </div>
                
                <div class="navigation-buttons">
                    <button id="prev-btn" class="btn-secondary" disabled>
                        <i class="fas fa-arrow-left"></i> 上一题
                    </button>
                    <button id="next-btn" class="btn-primary">
                        下一题 <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
            
            <!-- 结果容器 -->
            <div id="result-page" style="display: none;">
                <div class="test-id-result">
                    <h2>🎉 评估完成！</h2>
                    <p>您的专属测试编号：</p>
                    <div class="test-id-number" id="test-id-number">LAA24001</div>
                    <p>正在跳转到支付页面...</p>
                    <div class="progress-bar" style="margin: 20px auto; width: 200px;">
                        <div class="progress-fill" id="redirect-progress" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/test-id.js"></script>
    <script>
        // 问卷数据
        const questions = [
            { id: 1, title: "正面观察时，面部左右对称度如何？", options: [
                "A. 基本对称，无明显差异",
                "B. 轻微不对称，仔细观察可见", 
                "C. 明显不对称，一眼可见差异",
                "D. 严重不对称，影响外观"
            ]},
            { id: 2, title: "侧面轮廓的流畅度如何？", options: [
                "A. 非常流畅，线条优美",
                "B. 基本流畅，局部稍有不足",
                "C. 不够流畅，有明显转折",
                "D. 非常不流畅，多处凹陷或突出"
            ]},
            { id: 3, title: "下巴的对称性和位置？", options: [
                "A. 居中对称，位置合适",
                "B. 轻微偏移，但不明显",
                "C. 明显偏移，影响面部平衡",
                "D. 严重偏移，需要矫正"
            ]},
            { id: 4, title: "眼睛的大小和位置对称度？", options: [
                "A. 双眼基本对称",
                "B. 轻微大小眼或位置差异",
                "C. 明显不对称，影响美观",
                "D. 严重不对称，影响功能"
            ]},
            { id: 5, title: "鼻子的位置和形态？", options: [
                "A. 居中笔直，形态良好",
                "B. 轻微偏斜或形态不完美",
                "C. 明显偏斜，影响面部中线",
                "D. 严重偏斜，需要手术矫正"
            ]},
            { id: 6, title: "嘴唇的对称性和厚度？", options: [
                "A. 对称均匀，厚度适中",
                "B. 轻微不对称或厚度不均",
                "C. 明显不对称，影响笑容",
                "D. 严重不对称，影响功能"
            ]},
            { id: 7, title: "颧骨的突出度和对称性？", options: [
                "A. 对称适中，轮廓优美",
                "B. 轻微不对称或突出度不均",
                "C. 明显不对称，影响面部立体感",
                "D. 严重不对称，需要调整"
            ]},
            { id: 8, title: "面部皮肤紧致度？", options: [
                "A. 紧致有弹性",
                "B. 轻度松弛，有细纹",
                "C. 明显松弛，有皱纹",
                "D. 严重松弛，皮肤下垂"
            ]},
            { id: 9, title: "面部轮廓的清晰度？", options: [
                "A. 轮廓清晰，下颌线明显",
                "B. 轮廓基本清晰，局部模糊",
                "C. 轮廓不够清晰，有双下巴",
                "D. 轮廓模糊，缺乏立体感"
            ]},
            { id: 10, title: "笑容时的对称性？", options: [
                "A. 笑容对称自然",
                "B. 笑容轻微不对称",
                "C. 笑容明显歪斜",
                "D. 笑容严重不对称"
            ]},
            { id: 11, title: "面部肌肉的动态平衡？", options: [
                "A. 动态平衡良好",
                "B. 轻微不平衡，表情时可见",
                "C. 明显不平衡，影响表情",
                "D. 严重不平衡，需要治疗"
            ]},
            { id: 12, title: "整体面部协调性？", options: [
                "A. 非常协调，五官搭配和谐",
                "B. 基本协调，局部稍有不足",
                "C. 不够协调，影响整体美观",
                "D. 非常不协调，需要全面调整"
            ]}
        ];
        
        // 当前状态
        let currentQuestion = 0;
        let answers = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            const questionTitle = document.getElementById('question-title');
            const optionsContainer = document.getElementById('options-container');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const questionPage = document.getElementById('question-page');
            const resultPage = document.getElementById('result-page');
            const testIdNumber = document.getElementById('test-id-number');
            const redirectProgress = document.getElementById('redirect-progress');
            
            // 初始化第一题
            loadQuestion(currentQuestion);
            
            // 上一题按钮
            prevBtn.addEventListener('click', function() {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    loadQuestion(currentQuestion);
                }
            });
            
            // 下一题按钮
            nextBtn.addEventListener('click', function() {
                const selectedOption = document.querySelector('.option-btn.selected');
                
                if (!selectedOption && currentQuestion < questions.length - 1) {
                    alert('请选择一个答案');
                    return;
                }
                
                if (selectedOption) {
                    answers[currentQuestion] = selectedOption.dataset.value;
                }
                
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    loadQuestion(currentQuestion);
                } else {
                    // 完成所有题目
                    completeAssessment();
                }
            });
            
            // 加载题目
            function loadQuestion(index) {
                const question = questions[index];
                
                // 更新题目
                questionTitle.textContent = question.title;
                
                // 更新选项
                optionsContainer.innerHTML = '';
                question.options.forEach((option, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.dataset.value = String.fromCharCode(65 + i); // A, B, C, D
                    btn.textContent = option;
                    
                    // 如果之前已选择，标记为选中
                    if (answers[index] === btn.dataset.value) {
                        btn.classList.add('selected');
                    }
                    
                    btn.addEventListener('click', function() {
                        // 移除其他选项的选中状态
                        document.querySelectorAll('.option-btn').forEach(opt => {
                            opt.classList.remove('selected');
                        });
                        
                        // 选中当前选项
                        this.classList.add('selected');
                    });
                    
                    optionsContainer.appendChild(btn);
                });
                
                // 更新进度
                const progress = ((index + 1) / questions.length) * 100;
                progressFill.style.width = `${progress}%`;
                progressText.textContent = `${index + 1}/${questions.length}`;
                
                // 更新按钮状态
                prevBtn.disabled = index === 0;
                nextBtn.textContent = index === questions.length - 1 ? 
                    '完成评估 <i class="fas fa-check"></i>' : 
                    '下一题 <i class="fas fa-arrow-right"></i>';
            }
            
            // 完成评估
            function completeAssessment() {
                // 生成测试编号
                const testId = window.generateTestId ? window.generateTestId() : 'LAA' + (24000 + Math.floor(Math.random() * 1000));
                
                // 显示结果页面
                questionPage.style.display = 'none';
                resultPage.style.display = 'block';
                testIdNumber.textContent = testId;
                
                // 保存到localStorage
                localStorage.setItem('current_test_id', testId);
                localStorage.setItem('laa_answers', JSON.stringify(answers));
                
                // 3秒倒计时跳转
                let countdown = 3;
                const countdownInterval = setInterval(function() {
                    countdown--;
                    const progress = ((3 - countdown) / 3) * 100;
                    redirectProgress.style.width = `${progress}%`;
                    
                    if (countdown <= 0) {
                        clearInterval(countdownInterval);
                        window.location.href = 'payment-page.html?testId=' + encodeURIComponent(testId);
                    }
                }, 1000);
            }
            
            // 如果有URL参数，直接显示结果
            const urlParams = new URLSearchParams(window.location.search);
            const testIdParam = urlParams.get('testId');
            if (testIdParam) {
                questionPage.style.display = 'none';
                resultPage.style.display = 'block';
                testIdNumber.textContent = testIdParam;
            }
        });
    </script>
</body>
</html>
