<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大小脸免费初筛</title>
<style>
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:#f5f7fb; color:#1f2937;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
body { min-height:100vh; }
.page { width:100%; max-width:560px; margin:0 auto; padding:16px 16px 28px; display:none; }
.page.active { display:block; }
.hero-card,.question-card,.result-card { background:#fff; border-radius:20px; box-shadow:0 10px 30px rgba(15,23,42,.06); padding:20px 16px 18px; }
.eyebrow { font-size:12px; color:#6366f1; font-weight:700; letter-spacing:.04em; margin-bottom:10px; }
h1,h2,h3,p { margin-top:0; }
.hero-title { font-size:28px; line-height:1.35; margin-bottom:10px; color:#111827; }
.hero-subtitle,.question-observation,.result-summary { color:#6b7280; line-height:1.7; font-size:14px; }
.feature-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0 18px; }
.feature-item { background:#f8fafc; border:1px solid #e5e7eb; border-radius:14px; padding:12px 10px; text-align:center; font-size:13px; line-height:1.5; color:#374151; }
.primary-btn,.secondary-btn { width:100%; appearance:none; border:none; border-radius:14px; min-height:48px; padding:0 16px; font-size:15px; cursor:pointer; }
.primary-btn { background:#4f46e5; color:#fff; font-weight:600; }
.secondary-btn { background:#fff; border:1px solid #dbe3ef; color:#374151; }
.primary-btn:disabled,.secondary-btn:disabled { opacity:.45; cursor:not-allowed; }
.safe-note,.gray-tip { margin-top:12px; text-align:center; font-size:12px; color:#9ca3af; line-height:1.6; }
.topbar { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.progress-wrap { flex:1; }
.progress-text { font-size:13px; color:#6b7280; margin-bottom:6px; }
.progress-bar { width:100%; height:8px; border-radius:999px; background:#e5e7eb; overflow:hidden; }
.progress-fill { width:0%; height:100%; background:linear-gradient(90deg,#4f46e5,#3b82f6); transition:width .2s ease; }
.question-title { font-size:22px; line-height:1.45; margin-bottom:12px; color:#111827; }
.observation-box { background:#f8fafc; border:1px solid #e5e7eb; color:#4b5563; border-radius:14px; padding:12px; margin-bottom:16px; font-size:14px; line-height:1.7; }
.result-label { font-size:12px; color:#6b7280; margin-bottom:6px; }
.options-container { display:grid; gap:12px; }
.option { width:100%; background:#fff; border:1.5px solid #dbe3ef; border-radius:16px; padding:14px; display:flex; align-items:flex-start; gap:12px; cursor:pointer; transition:all .18s ease; }
.option:hover { border-color:#a5b4fc; transform:translateY(-1px); }
.option.selected { border-color:#4f46e5; background:#eef2ff; box-shadow:0 0 0 3px rgba(79,70,229,.08); }
.option-indicator { width:28px; height:28px; border-radius:999px; display:grid; place-items:center; flex:0 0 28px; background:#f3f4f6; color:#374151; font-size:13px; font-weight:700; margin-top:1px; }
.option.selected .option-indicator { background:#4f46e5; color:#fff; }
.option-text { font-size:15px; line-height:1.7; color:#111827; }
.question-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.result-headline { font-size:24px; line-height:1.35; color:#111827; margin-bottom:8px; }
.result-subheadline { font-size:16px; line-height:1.5; color:#4f46e5; font-weight:600; margin-bottom:18px; }
.result-grid { display:grid; gap:12px; margin:16px 0; }
.result-item { background:#f8fafc; border:1px solid #e5e7eb; border-radius:14px; padding:12px; }
.result-value { font-size:16px; line-height:1.55; color:#111827; font-weight:600; }
.result-actions { display:grid; gap:12px; }
</style>
</head>
<body>
<section id="home-page" class="page active">
<div class="hero-card">
  <div class="eyebrow">LAA · 免费初筛</div>
  <h1 class="hero-title">大小脸免费初筛</h1>
  <p class="hero-subtitle">12题，约1分钟，帮你先看真假倾向和主要方向。</p>
  <div class="feature-grid">
    <div class="feature-item">12题快速完成</div>
    <div class="feature-item">只做初筛判断</div>
    <div class="feature-item">移动端单页操作</div>
  </div>
  <button id="start-btn" class="primary-btn" type="button">开始测试</button>
  <div class="safe-note">结果仅供当前自测参考，不构成正式评估或医疗建议。</div>
</div>
</section>

<section id="question-page" class="page">
<div class="topbar">
  <button id="prev-btn" class="secondary-btn" type="button">上一题</button>
  <div class="progress-wrap">
    <div id="progress-text" class="progress-text">第 1/12 题</div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
  </div>
</div>
<div class="question-card">
  <div class="eyebrow">问题页</div>
  <h2 id="question-title" class="question-title"></h2>
  <div class="observation-box">
    <div class="result-label">观察标准</div>
    <div id="observation" class="question-observation"></div>
  </div>
  <div id="options-container" class="options-container"></div>
  <div class="question-actions">
    <button id="prev-btn-bottom" class="secondary-btn" type="button">上一题</button>
    <button id="next-btn" class="primary-btn" type="button" disabled>下一题</button>
  </div>
</div>
</section>

<section id="result-page" class="page">
<div class="result-card">
  <div class="eyebrow">初筛结果</div>
  <h2 id="result-tendency" class="result-headline"></h2>
  <div id="result-direction" class="result-subheadline"></div>
  <div class="result-grid">
    <div class="result-item"><div class="result-label">真假倾向</div><div id="result-tendency-desc" class="result-value"></div></div>
    <div class="result-item"><div class="result-label">主问题方向</div><div id="result-direction-desc" class="result-value"></div></div>
    <div class="result-item"><div class="result-label">左右侧提示</div><div id="result-side" class="result-value"></div></div>
    <div class="result-item"><div class="result-label">复杂度提示</div><div id="result-summary" class="result-value"></div></div>
  </div>
  <p id="result-summary-text" class="result-summary"></p>
  <div class="gray-tip">结果仅代表当前自测倾向，不等同于正式评估结果。</div>
  <div class="result-actions">
    <button id="detail-btn" class="primary-btn" type="button">查看详细分析与训练建议</button>
    <button id="retest-btn" class="secondary-btn" type="button">重新测试</button>
  </div>
</div>
</section>

<script src="questions.js"></script>
<script src="scoring.js"></script>
<script src="results.js"></script>
<script src="app.js"></script>
</body>
</html>
