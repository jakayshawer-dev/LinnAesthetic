<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAA · 大小脸免费评估（简化版）</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="container">
                <div class="logo">
                    <i class="fas fa-user-md"></i>
                </div>
                <h1 class="main-title">大小脸免费评估</h1>
                <p class="subtitle">LAA · Linn Asymmetry Assessment</p>
                <p class="test-info">12题，约1分钟，帮你先看真假倾向和主要方向</p>
                
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>专业评估</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-clock"></i>
                        <span>快速完成测试</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>隐私保护</span>
                    </div>
                </div>
                
                <button id="start-btn" class="btn-primary">
                    开始测试
                </button>
                
                <div class="footer-note">
                    <p>评估结果仅供参考，不构成医疗建议</p>
                </div>
            </div>
        </div>
        
        <!-- 题目页 -->
        <div id="question-page" class="page">
            <div class="container">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div id="progress-text" class="progress-text">第 1/12 题</div>
                </div>
                
                <div class="question-card">
                    <h2 id="question-title" class="question-title"></h2>
                    <div id="observation" class="observation"></div>
                    
                    <div id="options-container" class="options-container">
                        <!-- 选项将通过JS动态生成 -->
                    </div>
                    
                    <div class="navigation">
                        <button id="prev-btn" class="btn-secondary">
                            <i class="fas fa-arrow-left"></i> 上一题
                        </button>
                        <button id="next-btn" class="btn-primary" disabled>
                            下一题 <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结果页 -->
        <div id="result-page" class="page">
            <div class="container">
                <div class="result-header">
                    <div class="logo">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <h1 class="main-title">评估完成</h1>
                    <p class="subtitle">以下是你的初步评估结果</p>
                </div>
                
                <div class="result-card">
                    <div class="result-section">
                        <h3><i class="fas fa-lightbulb"></i> 主要倾向</h3>
                        <div id="result-tendency" class="result-value"></div>
                        <p id="result-tendency-desc" class="result-desc"></p>
                    </div>
                    
                    <div class="result-section">
                        <h3><i class="fas fa-arrows-alt-h"></i> 主要方向</h3>
                        <div id="result-direction" class="result-value"></div>
                        <p id="result-direction-desc" class="result-desc"></p>
                    </div>
                    
                    <div class="result-section">
                        <h3><i class="fas fa-balance-scale"></i> 偏侧表现</h3>
                        <div id="result-side" class="result-value"></div>
                        <p id="result-side-desc" class="result-desc"></p>
                    </div>
                    
                    <div class="result-summary">
                        <h3><i class="fas fa-file-alt"></i> 总结</h3>
                        <p id="result-summary" class="summary-text"></p>
                    </div>
                </div>
                
                <div class="result-actions">
                    <button id="retest-btn" class="btn-secondary">
                        <i class="fas fa-redo"></i> 重新测试
                    </button>
                    <button id="advanced-btn" class="btn-primary">
                        进阶评估 <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                
                <div class="footer-note">
                    <p>此结果为初步评估，如需更精准分析，请进行进阶评估</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本文件 -->
    <script src="questions.js"></script>
    <script src="scoring.js"></script>
    <script src="results.js"></script>
    <script src="app.js"></script>
</body>
</html>
