<!doctype html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>第一层问卷验证版</title>
 <style>
 body {
 font-family: Arial, sans-serif;
 background: #f5f7fb;
 margin: 0;
 padding: 20px;
 }
 .container {
 max-width: 560px;
 margin: 0 auto;
 background: #fff;
 border-radius: 16px;
 padding: 20px;
 }
 .question {
 margin-bottom: 24px;
 }
 .question h3 {
 margin-bottom: 12px;
 font-size: 18px;
 }
 .options {
 display: grid;
 gap: 10px;
 }
 .option {
 border: 1px solid #ddd;
 border-radius: 10px;
 padding: 12px;
 cursor: pointer;
 background: #fff;
 }
 .option:hover {
 background: #f0f4ff;
 border-color: #4f46e5;
 }
 .option.selected {
 background: #eef2ff;
 border-color: #4f46e5;
 }
 .btn {
 width: 100%;
 padding: 14px;
 border: none;
 border-radius: 12px;
 background: #4f46e5;
 color: #fff;
 font-size: 15px;
 cursor: pointer;
 }
 .result {
 margin-top: 20px;
 padding: 14px;
 background: #f8fafc;
 border-radius: 12px;
 white-space: pre-wrap;
 }
 </style>
</head>
<body>

<div class="container">
 <h2>第一层问卷验证版</h2>

 <div class="question" id="question-1">
 <h3>问题 1：你最喜欢的颜色是什么？</h3>
 <div class="options">
 <div class="option" onclick="selectOption(1, '红色', this)">红色</div>
 <div class="option" onclick="selectOption(1, '蓝色', this)">蓝色</div>
 <div class="option" onclick="selectOption(1, '绿色', this)">绿色</div>
 </div>
 </div>

 <div class="question" id="question-2">
 <h3>问题 2：你喜欢的季节是什么？</h3>
 <div class="options">
 <div class="option" onclick="selectOption(2, '春天', this)">春天</div>
 <div class="option" onclick="selectOption(2, '夏天', this)">夏天</div>
 <div class="option" onclick="selectOption(2, '秋天', this)">秋天</div>
 <div class="option" onclick="selectOption(2, '冬天', this)">冬天</div>
 </div>
 </div>

 <button class="btn" onclick="submitAnswers()">提交</button>

 <div id="result" class="result" style="display:none;"></div>
</div>

<script>
 let answers = {};

 function selectOption(questionId, option, el) {
 answers[questionId] = option;

 const container = el.parentElement;
 container.querySelectorAll('.option').forEach(item => {
 item.classList.remove('selected');
 });
 el.classList.add('selected');
 }

 function submitAnswers() {
 const resultBox = document.getElementById('result');
 resultBox.style.display = 'block';
 resultBox.innerText = '提交成功，当前答案：\n' + JSON.stringify(answers, null, 2);
 }
</script>

</body>
</html>
