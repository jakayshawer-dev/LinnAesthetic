<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小化淘宝跳转测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .test-button {
            background: #FF4400;
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            margin: 30px;
            transition: all 0.3s;
        }
        .test-button:hover {
            background: #FF5500;
            transform: scale(1.05);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }
        .success { border-left: 5px solid #28a745; }
        .error { border-left: 5px solid #dc3545; }
        .warning { border-left: 5px solid #ffc107; }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>最小化淘宝跳转测试</h1>
    <p>这个测试排除了所有外部依赖，只测试核心功能。</p>
    
    <button class="test-button" id="taobao-btn">
        🛒 点击测试淘宝跳转
    </button>
    
    <div id="test-result" class="result"></div>
    
    <div class="result">
        <h3>测试说明：</h3>
        <p>这个测试使用与支付页面完全相同的代码逻辑：</p>
        <ol>
            <li>定义淘宝链接常量</li>
            <li>获取按钮元素</li>
            <li>绑定点击事件</li>
            <li>在事件处理函数中调用 <code>window.open()</code></li>
        </ol>
        <p>如果这个测试工作，但支付页面不工作，问题可能在：</p>
        <ul>
            <li>外部JS文件错误</li>
            <li>DOM加载时机问题</li>
            <li>浏览器安全限制</li>
        </ul>
    </div>
    
    <script>
        // 淘宝链接（与支付页面相同）
        const TAOBAO_URL = 'https://item.taobao.com/item.htm?ft=t&id=1034939670570';
        
        // 获取按钮元素（与支付页面相同）
        const taobaoBtn = document.getElementById('taobao-btn');
        const resultDiv = document.getElementById('test-result');
        
        // 显示结果
        function showResult(message, type) {
            resultDiv.innerHTML = `<div class="${type}">${message}</div>`;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        // 检查按钮是否存在
        if (!taobaoBtn) {
            showResult('❌ 错误：未找到淘宝按钮元素（ID: taobao-btn）', 'error');
        } else {
            showResult('✅ 成功找到淘宝按钮元素', 'success');
            
            // 绑定点击事件（与支付页面相同）
            taobaoBtn.addEventListener('click', function() {
                console.log('淘宝按钮被点击');
                
                try {
                    // 尝试打开淘宝链接（与支付页面相同）
                    console.log('尝试打开：', TAOBAO_URL);
                    const newWindow = window.open(TAOBAO_URL, '_blank');
                    
                    if (newWindow === null || newWindow === undefined) {
                        showResult('⚠️ 警告：window.open() 返回 null/undefined<br>可能原因：浏览器弹出窗口被阻止', 'warning');
                        showResult('💡 解决方案：<br>1. 允许此网站的弹出窗口<br>2. 按住Ctrl键点击按钮<br>3. 右键按钮选择"在新标签页中打开"', 'warning');
                    } else if (typeof newWindow === 'object' && newWindow !== null) {
                        showResult('✅ 成功：新窗口已打开<br>淘宝链接：<code>' + TAOBAO_URL + '</code>', 'success');
                        
                        // 模拟支付页面的提示
                        setTimeout(() => {
                            resultDiv.innerHTML += '<div class="warning">💡 提示：请在淘宝完成下单</div>';
                        }, 500);
                    }
                } catch (error) {
                    showResult('❌ 错误：执行 window.open() 时发生异常<br>' + error.message, 'error');
                }
            });
            
            showResult('✅ 淘宝按钮事件绑定成功', 'success');
        }
        
        // 页面加载完成日志
        window.addEventListener('load', function() {
            console.log('页面加载完成');
            console.log('淘宝链接：', TAOBAO_URL);
            console.log('淘宝按钮：', taobaoBtn);
            
            // 检查 window.open 是否可用
            if (typeof window.open !== 'function') {
                showResult('❌ 严重错误：window.open 不是函数', 'error');
            } else {
                console.log('window.open 函数可用');
            }
        });
        
        // 捕获全局错误
        window.addEventListener('error', function(event) {
            console.error('全局错误：', event.message, 'at', event.filename, ':', event.lineno);
            showResult('❌ JavaScript错误：' + event.message, 'error');
        });
        
        // 检查是否在安全上下文中
        if (window.location.protocol === 'file:') {
            showResult('⚠️ 警告：页面通过 file:// 协议打开，某些功能可能受限', 'warning');
        }
        
        if (window.location.protocol === 'http:' && !window.location.hostname.includes('localhost')) {
            showResult('⚠️ 警告：页面通过 HTTP 协议打开，非本地主机', 'warning');
        }
    </script>
</body>
</html>
