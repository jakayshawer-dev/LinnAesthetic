<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LAA · 评估结果</title>
  <style>
    body {
      max-width: 480px;
      margin: 0 auto;
      background: #fafaf7;
      min-height: 100vh;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin: 20px 0 8px;
    }
    .result-id-card {
      background: #fff;
      border: 1.5px solid #4a7d70;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 16px 0;
      box-shadow: 0 2px 8px rgba(74,125,112,0.08);
    }
    .result-id-label {
      font-size: 12px;
      color: #2d5b4f;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .result-id-value {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f0;
      padding: 8px 10px;
      border-radius: 6px;
      user-select: all;
      word-break: break-all;
      margin-bottom: 6px;
    }
    .result-id-hint {
      font-size: 11px;
      color: #6b6b6b;
      line-height: 1.5;
    }
    .summary-card {
      background: #fff;
      border: 1px solid #e8e8e0;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 16px 0;
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #f0f0e8;
    }
    .summary-line:last-child { border-bottom: none; }
    .summary-label { color: #6b6b6b; }
    .summary-value { color: #1a1a1a; font-weight: 500; }
    .info-card {
      background: linear-gradient(135deg, #fff8e6 0%, #ffefc7 100%);
      border: 1.5px solid #e8b75a;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
      text-align: center;
    }
    .info-card .icon { font-size: 32px; margin-bottom: 10px; }
    .info-card .title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
    .info-card .desc { font-size: 13px; color: #4a4a4a; line-height: 1.7; }
    .action-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
      margin: 8px 0;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, #2d5b4f, #4a7d70);
      color: white;
    }
    .action-btn.secondary {
      background: #fff;
      color: #2d5b4f;
      border: 1.5px solid #4a7d70;
    }
    .back-link {
      display: block;
      text-align: center;
      color: #6b6b6b;
      font-size: 13px;
      margin-top: 16px;
      text-decoration: none;
    }
    .empty-state {
      background: #fff;
      border: 1px solid #e8e8e0;
      border-radius: 12px;
      padding: 40px 20px;
      margin: 16px 0;
      text-align: center;
      color: #6b6b6b;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1 class="page-title">评估结果</h1>

  <div id="content"></div>

  <a class="back-link" href="advanced-result.html">‹ 返回第二层结果</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>

  <script>
  (async function main() {
    const resultid = localStorage.getItem('laa_second_layer_result_id');
    const content = document.getElementById('content');

    if (!resultid) {
      content.innerHTML = `
        <div class="empty-state">
          未找到评估编号。<br>
          请先完成第一层 + 第二层评估。
        </div>
      `;
      return;
    }

    // 评估编号卡
    const idCard = `
      <div class="result-id-card">
        <div class="result-id-label">📋 你的评估编号</div>
        <div class="result-id-value">${resultid}</div>
        <div class="result-id-hint">点击上方编号可全选复制 · 发送给老师</div>
      </div>
    `;

    // 摘要卡（从 localStorage 读 v1.2 结果）
    const resultRaw = localStorage.getItem('laa_second_layer_result_v12');
    let summaryHtml = '';
    if (resultRaw) {
      try {
        const r = JSON.parse(resultRaw);
        const NAMES = {
          T1: 'T1｜口角启动型', T2: 'T2｜下颌偏移型', T3: 'T3｜面中支撑弱型',
          T4: 'T4｜下颌缘松垮型', T5: 'T5｜头颈牵拉型',
        };
        summaryHtml = `
          <div class="summary-card">
            <div class="summary-line">
              <span class="summary-label">主因</span>
              <span class="summary-value">${NAMES[r.mainType] || r.mainType || '—'}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">次因</span>
              <span class="summary-value">${r.secondaryType ? (NAMES[r.secondaryType] || r.secondaryType) : '暂未发现明显次因'}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">侧别</span>
              <span class="summary-value">${r.sideHint || '—'}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">复杂度</span>
              <span class="summary-value">${r.complexityHint || '—'}</span>
            </div>
          </div>
        `;
      } catch (e) { /* ignore */ }
    }

    // 流程提示卡（核心信息）
    const infoCard = `
      <div class="info-card">
        <div class="icon">📨</div>
        <div class="title">评估已完成</div>
        <div class="desc">
          请将上方评估编号发送给老师<br>
          老师确认开通后，会给你单独的<br>
          <strong>第三层 14 天跟练链接</strong>
        </div>
      </div>
    `;

    content.innerHTML = idCard + summaryHtml + infoCard;
  })();
  </script>
</body>
</html>
