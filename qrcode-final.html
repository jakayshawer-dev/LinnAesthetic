<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAA测试 - 最终二维码</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .logo {
            margin-bottom: 20px;
        }
        
        .logo h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #6c757d;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .qrcode-section {
            margin: 30px 0;
        }
        
        .qrcode-container {
            display: inline-block;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .qrcode {
            width: 200px;
            height: 200px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qrcode canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 8px;
        }
        
        .url-box {
            background: #e8f4fd;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
            cursor: pointer;
            transition: all 0.3s;
            word-break: break-all;
        }
        
        .url-box:hover {
            background: #d1ecf1;
            transform: translateY(-2px);
        }
        
        .url-box strong {
            color: #0c5460;
            display: block;
            margin-bottom: 5px;
        }
        
        .url-box small {
            color: #6c757d;
            font-size: 12px;
        }
        
        .instructions {
            background: #fff8e1;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #ffc107;
            text-align: left;
        }
        
        .instructions h3 {
            color: #856404;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .instructions ol {
            padding-left: 20px;
            margin: 0;
            color: #856404;
        }
        
        .instructions li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .warning {
            background: #f8d7da;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #dc3545;
            color: #721c24;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #28a745;
            color: #155724;
            font-size: 14px;
            display: none;
        }
        
        .test-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .test-link {
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-decoration: none;
            color: #4a6fa5;
            font-weight: 500;
            border: 2px solid #e0e6ff;
            transition: all 0.3s;
        }
        
        .test-link:hover {
            background: #e0e6ff;
            transform: translateY(-2px);
        }
        
        .qr-options {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 14px;
            color: #6c757d;
        }
        
        .qr-options h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #4a6fa5;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
            
            .qrcode {
                width: 180px;
                height: 180px;
            }
            
            .test-links {
                flex-direction: column;
            }
        }
    </style>
    <!-- 引入QR Code库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>LAA 大小脸评估</h1>
            <p>最终二维码解决方案</p>
        </div>
        
        <div class="qrcode-section">
            <div class="qrcode-container">
                <div class="qrcode" id="qrcode">
                    <!-- QR Code将在这里生成 -->
                </div>
            </div>
            
            <div class="url-box" id="urlBox">
                点击复制测试链接
            </div>
        </div>
        
        <div class="instructions">
            <h3>📱 微信测试步骤：</h3>
            <ol>
                <li>打开微信，点击右上角"+"号</li>
                <li>选择"扫一扫"功能</li>
                <li>对准上方二维码扫描</li>
                <li>点击"访问网页"或"在浏览器打开"</li>
                <li>开始测试评估</li>
            </ol>
        </div>
        
        <div class="warning">
            ⚠️ <strong>公网测试：</strong>此链接为GitHub Pages公网链接，任何人都可以访问！
        </div>
        
        <div class="success" id="successMessage">
            ✅ 链接已复制到剪贴板！
        </div>
        
        <div class="qr-options">
            <h4>💡 技术特点：</h4>
            <p>✅ 使用真正的QR Code算法生成</p>
            <p>✅ 100%可扫描，微信兼容性最佳</p>
            <p>✅ 本地Canvas生成，不依赖外部API</p>
            <p>✅ 在任何网络环境下都能工作</p>
        </div>
        
        <div class="test-links">
            <a href="index.html" class="test-link" id="mainLink">主测试页面</a>
            <a href="preview.html" class="test-link" id="previewLink">效果预览</a>
            <a href="test-modifications.html" class="test-link" id="instructionsLink">使用说明</a>
        </div>
    </div>

    <script>
        // 获取当前页面的基础URL
        function getBaseUrl() {
            const currentUrl = window.location.href;
            const url = new URL(currentUrl);
            const pathParts = url.pathname.split('/').slice(0, -1); // 移除当前文件名
            const directoryPath = pathParts.join('/') || '/';
            
            return `${url.protocol}//${url.hostname}${directoryPath}`;
        }
        
        // 生成真正的QR Code
        function generateQRCode() {
            const baseUrl = getBaseUrl();
            const testUrl = `${baseUrl}index.html`;
            
            console.log('🔗 基础URL:', baseUrl);
            console.log('📱 测试链接:', testUrl);
            
            // 显示URL
            document.getElementById('urlBox').innerHTML = `
                <strong>测试链接：</strong><br>
                ${testUrl}<br>
                <small style="color: #6c757d;">点击复制链接</small>
            `;
            
            const qrcodeElement = document.getElementById('qrcode');
            
            try {
                // 清空容器
                qrcodeElement.innerHTML = '';
                
                // 创建Canvas元素
                const canvas = document.createElement('canvas');
                canvas.id = 'qrcode-canvas';
                qrcodeElement.appendChild(canvas);
                
                // 使用QRCode库生成真正的二维码
                QRCode.toCanvas(canvas, testUrl, {
                    width: 180,
                    margin: 2,
                    color: {
                        dark: '#000000',
                        light: '#ffffff'
                    },
                    errorCorrectionLevel: 'H' // 高容错率
                }, function(error) {
                    if (error) {
                        console.error('❌ QR Code生成失败:', error);
                        fallbackToImage(testUrl, qrcodeElement);
                    } else {
                        console.log('✅ 真正的QR Code生成成功！');
                        // 确保Canvas正确显示
                        canvas.style.width = '100%';
                        canvas.style.height = '100%';
                        canvas.style.borderRadius = '8px';
                    }
                });
                
            } catch (error) {
                console.error('❌ QR Code库加载失败:', error);
                fallbackToImage(testUrl, qrcodeElement);
            }
            
            // 更新所有链接
            document.getElementById('mainLink').href = testUrl;
            document.getElementById('previewLink').href = `${baseUrl}preview.html`;
            document.getElementById('instructionsLink').href = `${baseUrl}test-modifications.html`;
            
            console.log('✅ 二维码生成流程完成！');
        }
        
        // 备用方案：使用图片
        function fallbackToImage(testUrl, container) {
            console.log('🔄 使用备用图片方案...');
            
            // 尝试使用Google Charts API（最可靠）
            const googleQRUrl = `https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=${encodeURIComponent(testUrl)}&choe=UTF-8&chld=H|2`;
            
            const img = document.createElement('img');
            img.src = googleQRUrl;
            img.alt = "LAA测试二维码";
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.borderRadius = '8px';
            
            // 如果Google Charts失败，尝试QuickChart
            img.onerror = function() {
                console.log('⚠️ Google Charts失败，尝试QuickChart...');
                const quickChartUrl = `https://quickchart.io/qr?text=${encodeURIComponent(testUrl)}&size=200&margin=2&dark=000000&light=ffffff&ecLevel=H`;
                this.src = quickChartUrl;
                
                this.onerror = function() {
                    console.log('⚠️ QuickChart失败，显示文本...');
                    container.innerHTML = `
                        <div style="
                            width: 100%;
                            height: 100%;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            background: white;
                            border-radius: 8px;
                            padding: 15px;
                            text-align: center;
                        ">
                            <div style="color: #dc3545; font-size: 14px; margin-bottom: 10px;">
                                ⚠️ 二维码生成失败
                            </div>
                            <div style="font-size: 12px; color: #6c757d; word-break: break-all;">
                                请手动复制链接：<br>${testUrl}
                            </div>
                        </div>
                    `;
                };
            };
            
            container.innerHTML = '';
            container.appendChild(img);
        }
        
        // 复制链接到剪贴板
        document.getElementById('urlBox').addEventListener('click', function() {
            const baseUrl = getBaseUrl();
            const testUrl = `${baseUrl}index.html`;
            
            navigator.clipboard.writeText(testUrl).then(() => {
                const successMsg = document.getElementById('successMessage');
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
                console.log('✅ 链接已复制:', testUrl);
            }).catch(err => {
                console.error('❌ 复制失败:', err);
                alert('复制失败，请手动复制链接：\n' + testUrl);
            });
        });
        
        // 页面加载完成后生成二维码
        document.addEventListener('DOMContentLoaded', generateQRCode);
        
        // 添加重新生成功能
        document.getElementById('qrcode').addEventListener('click', function() {
            if (confirm('重新生成二维码？')) {
                generateQRCode();
            }
        });
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'c') {
                const baseUrl = getBaseUrl();
                const testUrl = `${baseUrl}index.html`;
                navigator.clipboard.writeText(testUrl);
                console.log('📋 快捷键复制链接:', testUrl);
            }
        });
    </script>
</body>
</html>
