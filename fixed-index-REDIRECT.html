<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面已重定向 - 使用正确流程</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 0 5px 5px 0;
        }
        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ 页面已更新</h1>
        
        <div class="warning">
            <strong>注意：</strong> 这个页面是旧版本，已不再使用。它会在免费评估后直接跳转到支付页面，跳过了必要的中间步骤。
        </div>
        
        <p>根据用户要求，淘宝支付页必须出现在<strong>上传照片以后</strong>，而不是在第一层免费评估完成后。</p>
        
        <p><strong>正确流程：</strong></p>
        <ol style="text-align: left; margin: 20px 0; padding-left: 20px;">
            <li>第一层免费评估结果</li>
            <li>点击进入 LAA 进阶评估（第二层说明页）</li>
            <li>4个补充问题</li>
            <li>上传自然正面照</li>
            <li>生成/显示测试编号</li>
            <li>进入"结果解锁页 / 淘宝支付页"</li>
        </ol>
        
        <p>请使用正确的流程页面：</p>
        
        <div style="margin: 30px 0;">
            <a href="index.html" class="btn">前往正确的主页面</a>
            <a href="test-full-flow.html" class="btn btn-secondary">查看完整流程测试</a>
        </div>
        
        <p style="font-size: 0.9em; color: #999;">
            如果你是通过旧链接访问此页面，请更新书签或链接，指向 <code>index.html</code>
        </p>
        
        <!-- 自动重定向到正确页面 -->
        <script>
            // 5秒后自动重定向
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 5000);
            
            // 显示倒计时
            let countdown = 5;
            const countdownElement = document.createElement('p');
            countdownElement.style.color = '#666';
            countdownElement.style.marginTop = '20px';
            countdownElement.innerHTML = `<strong>${countdown}</strong> 秒后自动跳转到正确页面...`;
            document.querySelector('.container').appendChild(countdownElement);
            
            const interval = setInterval(function() {
                countdown--;
                countdownElement.innerHTML = `<strong>${countdown}</strong> 秒后自动跳转到正确页面...`;
                if (countdown <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        </script>
    </div>
</body>
</html>
