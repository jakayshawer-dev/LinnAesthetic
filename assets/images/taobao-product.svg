<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff8e53;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="300" height="300" rx="12" fill="url(#gradient)" />
    
    <!-- 购物袋图标 -->
    <g transform="translate(150, 120)">
        <path d="M-40,-30 L40,-30 L50,40 L-50,40 Z" fill="white" opacity="0.2" />
        <path d="M-30,-40 L30,-40 L40,30 L-40,30 Z" fill="white" opacity="0.3" />
        <path d="M-20,-50 L20,-50 L30,20 L-30,20 Z" fill="white" />
        
        <!-- 手柄 -->
        <path d="M-15,-50 Q-15,-70 0,-70 Q15,-70 15,-50" fill="none" stroke="white" stroke-width="3" />
    </g>
    
    <!-- 文字 -->
    <text x="150" y="200" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
        淘宝商品图
    </text>
    <text x="150" y="230" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">
        LAA 进阶评估服务
    </text>
    <text x="150" y="260" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
        ￥29.9
    </text>
    
    <!-- 边框 -->
    <rect width="298" height="298" x="1" y="1" rx="11" fill="none" stroke="white" stroke-width="2" opacity="0.3" />
</svg>